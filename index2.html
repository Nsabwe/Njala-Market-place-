    <style>
        /* ---------- All your existing CSS here (unchanged) ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #0F2F40;
            --primary-light: #1A4A60;
            --accent: #DD4B2B;
            --accent-hover: #B4330F;
            --bg: #F5F7FA;
            --card-bg: #FFFFFF;
            --text-primary: #0A1C2F;
            --text-secondary: #4A6577;
            --border: #E8EDF3;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.06);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.1);
            --radius: 24px;
            --radius-sm: 12px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --danger: #DC3545;
            --success: #28A745;
            --warning: #FFC107;
            --sidebar-width: 320px;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            display: flex;
            min-height: 100vh;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 20px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* ---------- SIDEBAR ---------- */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: var(--sidebar-width);
            background: var(--card-bg);
            border-right: 1px solid var(--border);
            padding: 1.5rem 1.25rem;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: var(--shadow-sm);
            transition: transform 0.3s ease;
        }
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header .logo {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sidebar-header .logo span {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .sidebar-header .logo i { -webkit-text-fill-color: var(--accent); font-size: 1.2rem; }
        .sidebar-close {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .sidebar .profile-section {
            text-align: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .sidebar .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
            margin: 0 auto 0.5rem;
            cursor: pointer;
            transition: var(--transition);
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: var(--text-secondary);
            overflow: hidden;
        }
        .sidebar .profile-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 0 4px rgba(221,75,43,0.2);
        }
        .sidebar .profile-name {
            font-weight: 700;
            font-size: 1.1rem;
        }
        .sidebar .profile-phone {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
        }
        .sidebar .profile-location {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
        }
        .sidebar .profile-gender {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
        }
        .sidebar .nav-section { margin-bottom: 1.5rem; }
        .sidebar .nav-section h4 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            opacity: 0.7;
        }
        .sidebar .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.6rem 0.8rem;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
            transition: var(--transition);
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }
        .sidebar .nav-item:hover {
            background: var(--bg);
            color: var(--primary);
        }
        .sidebar .nav-item.active {
            background: var(--primary);
            color: white;
        }
        .sidebar .nav-item i { width: 20px; text-align: center; }
        .sidebar .nav-item .badge {
            margin-left: auto;
            background: var(--accent);
            color: white;
            font-size: 0.6rem;
            padding: 0.1rem 0.5rem;
            border-radius: 50px;
        }
        .sidebar .nav-item .badge-success { background: var(--success); }

        /* ---------- MAIN CONTENT ---------- */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 1.5rem 2rem;
            min-height: 100vh;
        }

        /* ---------- TOP BAR ---------- */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .topbar .hamburger {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-primary);
            cursor: pointer;
        }
        .topbar .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .topbar .page-title i {
            color: var(--accent);
            margin-right: 8px;
        }
        .topbar .top-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .topbar .top-actions .notification-bell {
            position: relative;
            font-size: 1.2rem;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.4rem;
            border-radius: 50%;
            transition: var(--transition);
            background: var(--bg);
            border: none;
        }
        .topbar .top-actions .notification-bell:hover {
            background: var(--border);
        }
        .topbar .top-actions .notification-bell .notif-dot {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            background: var(--danger);
            border-radius: 50%;
            border: 2px solid white;
        }

        /* ---------- BUTTONS ---------- */
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            font-weight: 600;
            padding: 0.6rem 1.4rem;
            border-radius: 50px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        .btn-primary:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(221,75,43,0.3); }
        .btn-secondary {
            background: var(--bg);
            color: var(--text-primary);
            border: 1px solid var(--border);
            font-weight: 600;
            padding: 0.6rem 1.4rem;
            border-radius: 50px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-secondary:hover { background: var(--border); transform: translateY(-2px); }
        .btn-danger {
            background: var(--danger);
            color: white;
            border: none;
            font-weight: 600;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-danger:hover { background: #c82333; transform: translateY(-2px); }
        .btn-success {
            background: var(--success);
            color: white;
            border: none;
            font-weight: 600;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-success:hover { background: #218838; transform: translateY(-2px); }
        .btn-whatsapp {
            background: #25D366;
            color: white;
            border: none;
            font-weight: 600;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        .btn-whatsapp:hover { background: #128C7E; transform: translateY(-2px); }
        .btn-sms {
            background: #34B7F1;
            color: white;
            border: none;
            font-weight: 600;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        .btn-sms:hover { background: #1A8EC4; transform: translateY(-2px); }

        /* ---------- CONTAINER ---------- */
        .container { max-width: 1280px; margin: 0 auto; }

        /* ---------- OWNER MESSAGE ---------- */
        .owner-message-section { margin: 0 0 2rem 0; }
        .owner-message-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: var(--radius);
            padding: 1.8rem 2rem;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }
        .owner-message-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            pointer-events: none;
        }
        .owner-message-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
            margin-bottom: 0.8rem;
            position: relative;
            z-index: 1;
        }
        .owner-message-header i { font-size: 1.2rem; }
        .owner-message-content {
            font-size: 1.25rem;
            font-weight: 500;
            line-height: 1.6;
            position: relative;
            z-index: 1;
            min-height: 50px;
            display: flex;
            align-items: center;
        }
        .owner-message-content .message-loading { opacity: 0.7; font-weight: 400; }
        .owner-message-content .message-text { animation: fadeInMessage 0.5s ease; }
        @keyframes fadeInMessage {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .owner-message-content .message-quote { font-size: 1.5rem; opacity: 0.3; margin-right: 10px; }
        .btn-edit-message {
            position: absolute;
            top: 1.2rem;
            right: 1.5rem;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            z-index: 2;
        }
        .btn-edit-message:hover { background: rgba(255,255,255,0.25); transform: translateY(-1px); }

        /* ---------- HERO ---------- */
        .hero {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: var(--radius);
            padding: 3.5rem 3rem;
            margin-bottom: 2.5rem;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 500px;
            height: 500px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
            pointer-events: none;
        }
        .hero-content { position: relative; z-index: 1; max-width: 600px; }
        .hero h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 0.75rem; line-height: 1.2; }
        .hero p { font-size: 1.1rem; opacity: 0.85; margin-bottom: 1.5rem; line-height: 1.7; }
        .hero .btn-primary { background: white; color: var(--primary); }
        .hero .btn-primary:hover { background: var(--accent); color: white; }

        /* ---------- FEATURES ---------- */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }
        .feature-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.75rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }
        .feature-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            transition: var(--transition);
        }
        .feature-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: transparent; }
        .feature-card.items::after { background: var(--accent); }
        .feature-card.properties::after { background: #2A7F6E; }
        .feature-card.jobs::after { background: #2C6E9E; }
        .feature-card .icon-wrap {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        .feature-card.items .icon-wrap { background: #FDE8E3; color: var(--accent); }
        .feature-card.properties .icon-wrap { background: #E3F0ED; color: #2A7F6E; }
        .feature-card.jobs .icon-wrap { background: #E3EDF5; color: #2C6E9E; }
        .feature-card h3 { font-size: 1.25rem; margin-bottom: 0.5rem; font-weight: 700; }
        .feature-card p { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6; }

        /* ---------- SECTION HEADER ---------- */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .section-header h2 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.3px; display: flex; align-items: center; gap: 10px; }
        .section-header .greeting { font-size: 0.9rem; color: var(--text-secondary); font-weight: 500; }

        /* ---------- SEARCH BAR ---------- */
        .search-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            background: var(--card-bg);
            padding: 1rem 1.25rem;
            border-radius: 60px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            margin-bottom: 2rem;
            align-items: center;
        }
        .search-bar input,
        .search-bar select {
            flex: 1 1 160px;
            padding: 0.6rem 1rem;
            border: 1px solid var(--border);
            border-radius: 40px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            background: var(--bg);
            transition: var(--transition);
            min-width: 120px;
        }
        .search-bar input:focus,
        .search-bar select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(221,75,43,0.1);
        }
        .search-bar .btn-primary { flex: 0 1 auto; }

        /* ---------- LISTINGS GRID ---------- */
        .listings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .listing-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
        }
        .listing-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: transparent; }
        .listing-card .img-wrap {
            width: 100%;
            height: 200px;
            background: var(--bg);
            overflow: hidden;
            position: relative;
        }
        .listing-card .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .listing-card:hover .img-wrap img { transform: scale(1.03); }
        .listing-card .img-wrap .category-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .listing-info { padding: 1.25rem; }
        .listing-title { font-weight: 700; font-size: 1.05rem; margin-bottom: 0.3rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .listing-price { color: var(--accent); font-weight: 800; font-size: 1.2rem; margin: 0.4rem 0; }
        .listing-meta { display: flex; align-items: center; gap: 12px; color: var(--text-secondary); font-size: 0.8rem; flex-wrap: wrap; }
        .listing-meta i { width: 14px; }
        .listing-meta .badge { background: var(--bg); padding: 0.15rem 0.6rem; border-radius: 50px; font-size: 0.7rem; font-weight: 600; color: var(--text-secondary); }
        .contact-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
            flex-wrap: wrap;
        }
        .listing-card .poster-info {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
        }
        .listing-card .poster-info img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg);
        }
        .listing-card .poster-info .poster-name {
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-primary);
        }

        /* ---------- DASHBOARD STATS ---------- */
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.75rem 1.5rem;
            text-align: center;
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .stat-card .stat-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .stat-card h3 { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .stat-card p { color: var(--text-secondary); font-size: 0.85rem; }

        /* ---------- MODAL ---------- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            animation: fadeIn 0.25s ease;
        }
        .modal-overlay.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-content {
            background: var(--card-bg);
            max-width: 560px;
            width: 100%;
            padding: 2rem;
            border-radius: var(--radius);
            box-shadow: 0 40px 60px rgba(0,0,0,0.2);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; }
        .modal-content .close-modal {
            float: right;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: var(--transition);
        }
        .modal-content .close-modal:hover { color: var(--text-primary); transform: rotate(90deg); }

        /* ---------- FORMS ---------- */
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.4rem; color: var(--text-primary); }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: var(--transition);
            background: var(--card-bg);
            color: var(--text-primary);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(221,75,43,0.1);
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-actions { display: flex; gap: 0.75rem; margin-top: 0.5rem; flex-wrap: wrap; }
        .form-actions button { flex: 1; min-width: 120px; justify-content: center; }

        /* ---------- CROPPER ---------- */
        .cropper-container { max-height: 400px; margin-bottom: 1rem; }
        .cropper-container img { max-width: 100%; display: block; }
        .image-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin: 0.5rem 0 1rem;
        }
        .image-actions button { flex: 1; min-width: 80px; justify-content: center; }

        /* ---------- EDIT MESSAGE ---------- */
        .edit-message-form textarea {
            width: 100%;
            min-height: 120px;
            padding: 0.8rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: var(--transition);
            resize: vertical;
        }
        .edit-message-form textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(221,75,43,0.1);
        }
        .edit-message-form .char-count { text-align: right; font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.3rem; }

        /* ---------- EMPTY STATE ---------- */
        .empty-state { text-align: center; padding: 3rem 2rem; background: var(--card-bg); border-radius: var(--radius); border: 1px dashed var(--border); }
        .empty-state .empty-icon { font-size: 3rem; color: var(--border); margin-bottom: 1rem; }
        .empty-state h3 { font-weight: 600; margin-bottom: 0.5rem; }
        .empty-state p { color: var(--text-secondary); margin-bottom: 1.5rem; }

        /* ---------- LOADING ---------- */
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem;
        }
        .loading-spinner i { font-size: 2rem; color: var(--primary-light); }

        /* ---------- TOAST ---------- */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .toast {
            padding: 1rem 1.5rem;
            border-radius: var(--radius-sm);
            color: white;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease;
            min-width: 280px;
        }
        .toast-success { background: var(--success); }
        .toast-error { background: var(--danger); }
        .toast-info { background: var(--primary); }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ---------- FOOTER ---------- */
        footer { text-align: center; padding: 2rem 0; color: var(--text-secondary); font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 2rem; }

        /* ===== CHAT ===== */
        .chat-container {
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            height: 70vh;
            min-height: 400px;
        }
        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg);
        }
        .chat-header .chat-user {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .chat-header .chat-user img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg);
        }
        .chat-header .chat-user .name {
            font-weight: 600;
        }
        .chat-header .chat-user .status {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .chat-messages {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            background: var(--bg);
        }
        .chat-message {
            display: flex;
            flex-direction: column;
            max-width: 70%;
        }
        .chat-message.sent {
            align-self: flex-end;
            align-items: flex-end;
        }
        .chat-message.received {
            align-self: flex-start;
            align-items: flex-start;
        }
        .chat-message .bubble {
            padding: 0.8rem 1rem;
            border-radius: 12px;
            background: var(--card-bg);
            box-shadow: var(--shadow-sm);
            word-break: break-word;
        }
        .chat-message.sent .bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .chat-message.received .bubble {
            background: var(--card-bg);
            border-bottom-left-radius: 4px;
        }
        .chat-message .time {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
            padding: 0 0.2rem;
        }
        .chat-message.sent .time { color: rgba(255,255,255,0.7); }
        .chat-input {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            border-top: 1px solid var(--border);
            background: var(--card-bg);
        }
        .chat-input input {
            flex: 1;
            padding: 0.6rem 1rem;
            border: 1px solid var(--border);
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            background: var(--bg);
        }
        .chat-input input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .chat-input button {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 50px;
            background: var(--primary);
            color: white;
            cursor: pointer;
            transition: var(--transition);
        }
        .chat-input button:hover { background: var(--accent); }
        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding: 1rem;
            border-right: 1px solid var(--border);
            background: var(--card-bg);
            overflow-y: auto;
            max-height: 70vh;
            min-width: 240px;
        }
        .chat-list .chat-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;

            cursor: pointer;

        }
        .chat-list .chat-item:hover {
            background: var(--bg);

        }
        .chat-list .chat-item.active {
            background: var(--bg);
            border-color: var(--accent);
        }
        .chat-list .chat-item img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg);
        }
        .chat-list .chat-item .info {
            flex: 1;
        }
        .chat-list .chat-item .info .name {
            font-weight: 600;
        }
        .chat-list .chat-item .info .last-msg {
            font-size: 0.8rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-list .chat-item .time {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .chat-panel {
            display: flex;
            flex: 1;
            flex-direction: column;
        }
        .chat-two-col {
            display: flex;
            height: 70vh;
            min-height: 400px;
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .chat-two-col .chat-list-col {
            width: 280px;
            border-right: 1px solid var(--border);
            overflow-y: auto;
            background: var(--bg);
        }
        .chat-two-col .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-two-col .chat-main .chat-messages { flex: 1; }
        .chat-two-col .chat-main .chat-input { border-top: 1px solid var(--border); }
        /* Responsive */
        @media (max-width: 768px) {
            .chat-two-col .chat-list-col {
                display: none;
                width: 100%;
                border-right: none;
            }
            .chat-two-col .chat-list-col.active {
                display: block;
            }
            .chat-two-col .chat-main {
                display: block;
            }
            .chat-two-col .chat-main.hidden {
                display: none;
            }
            .chat-message { max-width: 85%; }
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 1024px) {
            .hero { padding: 2.5rem 2rem; }
            .hero h1 { font-size: 2rem; }
        }
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 300px;
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-close { display: block; }
            .main-content { margin-left: 0; padding: 1rem; }
            .topbar .hamburger { display: block; }
            .topbar .page-title { font-size: 1.2rem; }
            .hero { padding: 2rem 1.5rem; border-radius: var(--radius-sm); }

            .dashboard-stats { grid-template-columns: 1fr 1fr; }
            .search-bar { border-radius: var(--radius-sm); padding: 1rem; }
            .search-bar input,
            .search-bar select { flex: 1 1 100%; }
            .owner-message-card { padding: 1.5rem; border-radius: var(--radius-sm); }
            .owner-message-content { font-size: 1.05rem; }
            .btn-edit-message {
                position: static;
                margin-top: 1rem;
                width: 100%;

            }

            .toast { min-width: auto; }

        }
        @media (max-width: 480px) {

            .dashboard-stats { grid-template-columns: 1fr; }
            .form-actions { flex-direction: column; }
            .form-actions button { flex: none; }
        }
    </style>
</head>

<!-- JAVASCRIPT -->
<!-- ============================================================ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    // ============================================================
    // CONFIGURATION
    // ============================================================
    // ⚠️ UPDATE THIS TO YOUR BACKEND URL
    const API_URL ='https://njala-server-5-1.onrender.com' 

    // ============================================================
    // STATE
    // ============================================================
    let currentUser = null;
    let token = localStorage.getItem('token');
    let cropper = null;
    let pendingFormData = null;
    let pendingSection = 'items';
    let editImageData = null;
    let currentView = 'home';
    let resetPhone = '';
    let socket = null;

    // Chat state
    let currentChatUser = null; // { _id, name, profilePicture }
    let chatMessages = [];
    let allUsers = [];

    // ============================================================
    // TOAST
    // ============================================================
    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(100%)';
            setTimeout(() => toast.remove(), 300);
        }, 4000);
    }

    // ============================================================
    // SIDEBAR
    // ============================================================
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
    }

    // ============================================================
    // API CLIENT
    // ============================================================
    async function apiRequest(endpoint, method = 'GET', data = null, isFormData = false) {
        const headers = {};
        const token = localStorage.getItem('token');
        if (token) headers['Authorization'] = `Bearer ${token}`;
        const options = { method, headers };
        if (data) {
            if (isFormData) {
                options.body = data;
            } else {
                headers['Content-Type'] = 'application/json';
                options.body = JSON.stringify(data);
            }
        }
        try {
            const response = await fetch(`${API_URL}${endpoint}`, options);
            const result = await response.json();
            if (!response.ok) {
                if (response.status === 401) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    currentUser = null;
                    updateSidebarUI();
                    showToast('Session expired. Please login again.', 'error');
                    showAuth();
                    throw new Error('Unauthorized');
                }
                throw new Error(result.error || result.message || 'Request failed');
            }
            return result;
        } catch (error) {
            if (error.message === 'Failed to fetch') {
                showToast('⚠️ Cannot connect to server.', 'error');
            } else if (error.message !== 'Unauthorized') {
                showToast('❌ ' + error.message, 'error');
            }
            throw error;
        }
    }

    // ============================================================
    // SOCKET.IO SETUP
    // ============================================================
    function initSocket() {
        if (socket) socket.disconnect();
        const token = localStorage.getItem('token');
        if (!token) return;

        socket = io(API_URL, {
            auth: { token }
        });

        socket.on('connect', () => {
            console.log('🔌 Socket connected');
        });

        socket.on('connect_error', (err) => {
            console.error('Socket error:', err.message);
            showToast('Real-time connection error', 'error');
        });

        socket.on('new_message', (chat) => {
            // Add to current chat if open
            if (currentChatUser && chat.senderId === currentChatUser._id) {
                chatMessages.push(chat);
                renderChatMessages();
                // Mark as read
                socket.emit('mark_read', { otherUserId: currentChatUser._id });
            } else {
                // Update unread count
                updateUnreadCounts();
            }
            // Show notification if not in chat
            if (currentView !== 'chat' || !currentChatUser || chat.senderId !== currentChatUser._id) {
                showToast(`💬 New message from ${chat.senderName || 'Someone'}`, 'info');
            }
        });

        socket.on('unread_update', ({ count }) => {
            updateUnreadCounts();
        });

        socket.on('notification', (notification) => {
            // Update notification badge
            updateUnreadCounts();
            // Show toast
            showToast(`🔔 ${notification.title}: ${notification.body}`, 'info');
        });

        socket.on('disconnect', () => {
            console.log('🔌 Socket disconnected');
        });
    }

    // ============================================================
    // UNREAD COUNTS
    // ============================================================
    async function updateUnreadCounts() {
        if (!currentUser) return;
        try {
            // Chat unread
            const chatResult = await apiRequest('/api/chat/unread');
            const chatCount = chatResult.count || 0;
            document.getElementById('chatBadge').textContent = chatCount;

            // Notification unread
            const notifResult = await apiRequest('/api/notifications/unread-count');
            const notifCount = notifResult.count || 0;
            document.getElementById('notifBadge').textContent = notifCount;
            document.getElementById('notifDot').style.display = notifCount > 0 ? 'block' : 'none';
        } catch (e) {
            console.error('Error updating unread counts:', e);
        }
    }

    // ============================================================
    // AUTH
    // ============================================================
    async function login(phone, password) {
        try {
            const result = await apiRequest('/api/auth/login', 'POST', { phone, password });
            if (result.success) {
                localStorage.setItem('token', result.token);
                localStorage.setItem('user', JSON.stringify(result.user));
                currentUser = result.user;
                updateSidebarUI();
                initSocket();
                showHome();
                showToast('✅ Welcome back, ' + result.user.name + '!', 'success');
                return true;
            }
            return false;
        } catch (error) {
            return false;
        }
    }

    async function register(userData) {
        try {
            const email = userData.phone + '@njalamarket.com';
            const payload = { ...userData, email };
            const result = await apiRequest('/api/auth/register', 'POST', payload);
            if (result.success) {
                localStorage.setItem('token', result.token);
                localStorage.setItem('user', JSON.stringify(result.user));
                currentUser = result.user;
                updateSidebarUI();
                initSocket();
                showHome();
                showToast('🎉 Account created! Welcome to NjalaMarket.', 'success');
                return true;
            }
            return false;
        } catch (error) {
            return false;
        }
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        currentUser = null;
        if (socket) { socket.disconnect(); socket = null; }
        updateSidebarUI();
        showHome();
        showToast('👋 Logged out successfully', 'info');
    }

    function getCurrentUser() {
        const userStr = localStorage.getItem('user');
        if (userStr) {
            currentUser = JSON.parse(userStr);
            return currentUser;
        }
        return null;
    }

    function updateSidebarUI() {
        const isLoggedIn = !!currentUser;
        const avatar = document.getElementById('sidebarAvatar');
        const name = document.getElementById('sidebarName');
        const phone = document.getElementById('sidebarPhone');
        const location = document.getElementById('sidebarLocation');
        const gender = document.getElementById('sidebarGender');
        const authLink = document.getElementById('authLink');
        const logoutLink = document.getElementById('logoutLink');
        const dashboardLink = document.getElementById('dashboardLink');

    // CROPPER
    // ============================================================
    function initCropper(imageUrl) {
        setTimeout(() => {
            const img = document.getElementById('cropImage');
            if (!img) return;
            if (cropper) { cropper.destroy(); cropper = null; }
            cropper = new Cropper(img, {
                aspectRatio: 1,
                viewMode: 1,
                autoCropArea: 0.8,
                responsive: true,
                restore: false,
                guides: true,
                center: true,
                highlight: true,
                cropBoxMovable: true,
                cropBoxResizable: true,
                toggleDragModeOnDblclick: true,
            });
        }, 100);
    }

    function getCroppedImage() {
        if (!cropper) return null;
        return cropper.getCroppedCanvas({
            width: 600,
            height: 600,
            imageSmoothingEnabled: true,
            imageSmoothingQuality: 'high'
        }).toDataURL('image/jpeg', 0.9);
    }

    function getSkippedImage() {
        const img = document.getElementById('cropImage');
        if (!img) return null;
        const canvas = document.createElement('canvas');
        canvas.width = 600;
        canvas.height = 600;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, 600, 600);
        return canvas.toDataURL('image/jpeg', 0.8);
    }

    async function applySearch() {
        const query = document.getElementById('searchQuery').value.toLowerCase().trim();
        const category = document.getElementById('searchCategory').value;
        const location = document.getElementById('searchLocation').value.toLowerCase().trim();

        try {
            const [products, properties, jobs] = await Promise.all([
                apiRequest('/api/products'),
                apiRequest('/api/properties'),
                apiRequest('/api/jobs')
            ]);

            let all = [
                ...(products.products || []).map(p => ({ ...p, type: 'product' })),
                ...(properties.properties || []).map(p => ({ ...p, type: 'property' })),
                ...(jobs.jobs || []).map(j => ({ ...j, type: 'job' }))
            ];

            if (query) {
                all = all.filter(item => item.title.toLowerCase().includes(query) || (item.company && item.company.toLowerCase().includes(query)));
            }
            if (category) {
                all = all.filter(item => {
                    if (item.type === 'product') return item.category === category;
                    if (item.type === 'property') return item.listingType === category || item.type === category;
                    if (item.type === 'job') return item.employmentType === category;
                    return false;
                });
            }
            if (location) {
                all = all.filter(item => item.location.toLowerCase().includes(location));
            }

            const grid = document.getElementById('searchResults');
            if (all.length === 0) {
                grid.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-search"></i></div><h3>No matches found</h3><p>Try adjusting your search filters.</p></div>`;
            } else {
                grid.innerHTML = all.map(item => renderListingCard(item, false)).join('');
            }
        } catch (error) {
            showToast('Error searching listings', 'error');
        }
    }

    function clearSearch() {
        document.getElementById('searchQuery').value = '';
        document.getElementById('searchCategory').value = '';
        document.getElementById('searchLocation').value = '';
        showHome();
    }

    async function applySectionSearch(section) {
        const query = document.getElementById('sectionSearchQuery').value.toLowerCase().trim();
        const location = document.getElementById('sectionSearchLocation').value.toLowerCase().trim();
        const map = {
            items: { endpoint: 'products', type: 'product' },
            properties: { endpoint: 'properties', type: 'property' },
            jobs: { endpoint: 'jobs', type: 'job' }
        };
        const config = map[section];
        try {
            const result = await apiRequest(`/api/${config.endpoint}`);
            let items = result[config.endpoint] || [];
            items = items.map(item => ({ ...item, type: config.type }));

            if (query) items = items.filter(item => item.title.toLowerCase().includes(query) || (item.company && item.company.toLowerCase().includes(query)));
            if (location) items = items.filter(item => item.location.toLowerCase().includes(location));

            const grid = document.getElementById('sectionSearchResults');
            if (items.length === 0) {
                grid.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-search"></i></div><h3>No matches found</h3></div>`;
            } else {
                grid.innerHTML = items.map(item => renderListingCard(item, false)).join('');
            }
        } catch (error) {
            showToast('Error searching', 'error');
        }
    }

    // Global variable to track selected chat user
    let selectedChatUserId = null;

    function selectChatUser(userId) {
        const user = allUsers.find(u => u._id === userId);
        if (!user) return;
        selectedChatUserId = userId;
        currentChatUser = user;

        // Update header
        document.getElementById('chatUserName').textContent = user.name;
        const statusEl = document.getElementById('chatUserStatus');
        const online = user.isOnline ? 'Online' : 'Offline';
        const color = user.isOnline ? 'var(--success)' : 'var(--text-secondary)';
        statusEl.innerHTML = `<i class="fas fa-circle" style="color:${color};font-size:0.5rem;"></i> ${online}`;
        document.querySelector('#chatUserHeader img').src = user.profilePicture || `https://placehold.co/40x40/1e2f3d/white?text=${user.name.charAt(0)}`;

        // Enable input
        document.getElementById('chatInput').disabled = false;
        document.getElementById('chatSendBtn').disabled = false;

        // Highlight in list
        document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
        const listItem = document.querySelector(`.chat-item[data-userid="${userId}"]`);
        if (listItem) listItem.classList.add('active');

        // Fetch messages
        fetchChatMessages(userId);

        // On mobile, hide list and show chat
        if (window.innerWidth <= 768) {
            document.querySelector('.chat-list-col').classList.remove('active');
            document.querySelector('.chat-main').classList.remove('hidden');
        }

        // Mark as read
        if (socket) {
            socket.emit('mark_read', { otherUserId: userId });
        }
    }

    async function fetchChatMessages(userId) {
        try {
            const result = await apiRequest(`/api/chat/messages/${userId}`);
            chatMessages = result.messages || [];
            renderChatMessages();
        } catch (error) {
            showToast('Error loading messages', 'error');
        }
    }

    function renderChatMessages() {
        const container = document.getElementById('chatMessages');
        if (!container) return;
        if (chatMessages.length === 0) {
            container.innerHTML = `<div class="empty-state" style="padding:2rem;"><p>No messages yet. Say hello!</p></div>`;
            return;
        }
        let html = '';
        chatMessages.forEach(msg => {
            const isSent = msg.senderId === currentUser._id;
            const time = new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            html += `
                <div class="chat-message ${isSent ? 'sent' : 'received'}">
                    <div class="bubble">${msg.message}</div>
                    <div class="time">${time}</div>
                </div>
            `;
        });
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
    }

    function sendChatMessage() {
        const input = document.getElementById('chatInput');
        if (!input || !input.value.trim() || !currentChatUser) return;
        const msg = input.value.trim();
        // Send via socket
        if (socket && socket.connected) {
            socket.emit('send_message', { receiverId: currentChatUser._id, message: msg });
        } else {
            // Fallback to REST
            apiRequest('/api/chat/messages', 'POST', { receiverId: currentChatUser._id, message: msg })
                .then(res => {
                    chatMessages.push(res.message);
                    renderChatMessages();
                })
                .catch(err => showToast('Error sending message', 'error'));
        }
        // Optimistically add to UI
        const tempMsg = { senderId: currentUser._id, message: msg, createdAt: new Date().toISOString() };
        chatMessages.push(tempMsg);
        renderChatMessages();
        input.value = '';
    }

    function markChatRead() {
        if (!currentChatUser) return;
        if (socket) {
            socket.emit('mark_read', { otherUserId: currentChatUser._id });
        }
        // Update UI
        chatMessages.forEach(msg => { if (msg.senderId === currentChatUser._id) msg.read = true; });
        updateUnreadCounts();
    }

            <div id="resetCodeSection" style="display: none; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
                <p style="color: var(--text-secondary); margin-bottom: 1rem;">Enter the 6-digit code sent to your phone.</p>
                <form id="verifyCodeForm">
                    <div class="form-group"><label>Reset Code *</label><input type="text" id="resetCode" placeholder="123456" maxlength="6" required /></div>
                    <div class="form-group"><label>New Password (optional)</label><input type="password" id="newPassword" placeholder="Leave blank to keep old password" minlength="6" /></div>
                    <div class="form-group" style="display: flex; gap: 0.5rem; align-items: center;">
                        <input type="checkbox" id="keepOldPassword" style="width: auto;" />
                        <label for="keepOldPassword" style="margin: 0; font-weight: 400; font-size: 0.85rem;">Keep my old password</label>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary"><i class="fas fa-check"></i> Reset Password</button>
                        <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                    </div>
                </form>
            </div>
        `);
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('resetPhone').value.trim();
            if (!phone) { showToast('Please enter your phone number', 'error'); return; }
            if (!phone.match(/^[0-9]{10,12}$/)) {
                showToast('Please enter a valid phone number (e.g. 0999123456)', 'error');
                return;
            }
            try {
                const result = await apiRequest('/api/auth/forgot-password', 'POST', { phone });
                if (result.success) {
                    resetPhone = phone;
                    showToast('✅ Reset code sent to your phone!', 'success');
                    document.getElementById('resetCodeSection').style.display = 'block';
                }
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
            }
        });
        document.getElementById('verifyCodeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('resetCode').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const keepOldPassword = document.getElementById('keepOldPassword').checked;
            if (!code) { showToast('Please enter the reset code', 'error'); return; }
            if (!keepOldPassword && !newPassword) {
                showToast('Please enter a new password or check "Keep my old password"', 'error');
                return;
            }
            try {
                const verifyResult = await apiRequest('/api/auth/verify-reset-code', 'POST', { phone: resetPhone, code });
                if (verifyResult.success) {
                    const resetResult = await apiRequest('/api/auth/reset-password', 'POST', {
                        phone: resetPhone,
                        code,
                        newPassword: keepOldPassword ? undefined : newPassword,
                        keepOldPassword
                    });
                    if (resetResult.success) {
                        if (resetResult.keepOld) {
                            showToast('✅ You can continue using your old password', 'success');
                        } else {
                            showToast('✅ Password changed successfully!', 'success');
                        }
                        closeModal();
                    }
                }
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
            }
        });
    }

                </div>
                <div style="display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem;">
                    <button class="btn-primary" onclick="showPostForm('items')"><i class="fas fa-plus"></i> New Item</button>
                    <button class="btn-primary" onclick="showPostForm('properties')"><i class="fas fa-plus"></i> New Property</button>
                    <button class="btn-primary" onclick="showPostForm('jobs')"><i class="fas fa-plus"></i> New Job</button>
                    <button class="btn-secondary" onclick="showHome()"><i class="fas fa-arrow-left"></i> Back</button>
                </div>
                <div class="section-header"><h3>📋 Your Listings</h3></div>
                <div class="listings-grid">${listingsHtml}</div>
            `;
        } catch (error) {
            document.getElementById('app').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div>
                    <h3>Unable to load dashboard</h3>
                    <button class="btn-primary" onclick="showDashboard()"><i class="fas fa-refresh"></i> Retry</button>
                </div>
            `;
        }
    }

    // ============================================================
    // LOGOUT
    // ============================================================
    function handleLogout() {
        if (confirm('Are you sure you want to logout?')) {
            logout();
        }
    }

    // ============================================================
    // INIT
    // ============================================================
    getCurrentUser();
    updateSidebarUI();
    if (currentUser) {
        initSocket();
    }
    showHome();

    // Expose startChat to be called from other places
    window.startChat = startChat;
    window.selectChatUser = selectChatUser;
    window.sendChatMessage = sendChatMessage;
    window.markChatRead = markChatRead;
    window.markNotificationRead = markNotificationRead;
    window.markAllNotificationsRead = markAllNotificationsRead;
    window.deleteNotification = deleteNotification;

    // PWA: Register Service Worker (optional)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('Service Worker registered'))
            .catch(err => console.log('SW registration failed:', err));
    }

    // ============================================================
    // GLOBAL EXPOSURE (for onclick calls)
    // ============================================================
    window.showHome = showHome;
    window.showSection = showSection;
    window.showPostForm = showPostForm;
    window.showAuth = showAuth;
    window.showRegisterForm = showRegisterForm;
    window.showDashboard = showDashboard;
    window.showAllUsers = showAllUsers;
    window.showFriends = showFriends;
    window.showChat = showChat;
    window.showNotifications = showNotifications;
    window.openProfileSettings = openProfileSettings;
    window.openContactOwner = openContactOwner;
    window.handleLogout = handleLogout;
    window.closeModal = closeModal;
    window.toggleSidebar = toggleSidebar;
    window.closeSidebar = closeSidebar;
    window.applySearch = applySearch;
    window.clearSearch = clearSearch;
    window.applySectionSearch = applySectionSearch;
    window.editListing = editListing;
    window.deleteListing = deleteListing;
    window.confirmCrop = confirmCrop;
    window.skipCrop = skipCrop;
    window.cancelImage = cancelImage;
    window.initCropper = initCropper;
    window.getCroppedImage = getCroppedImage;
    window.getSkippedImage = getSkippedImage;
    window.fetchOwnerMessage = fetchOwnerMessage;
    window.openEditMessageModal = openEditMessageModal;
    window.showDetail = showDetail;
    window.showToast = showToast;
    window.confirmDeleteAccount = confirmDeleteAccount;
    window.showForgotPassword = showForgotPassword;
</script>
</body>
</html>
