<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>NjalaMarket | Premium Marketplace Malawi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <style>
        /* ---------- RESET & BASE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #0F2F40;
            --primary-light: #1A4A60;
            --accent: #DD4B2B;
            --accent-hover: #B4330F;
            --bg: #F5F7FA;
            --card-bg: #FFFFFF;
            --text-primary: #0A1C2F;
            --text-secondary: #4A6577;
            --border: #E8EDF3;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.06);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.1);
            --radius: 24px;
            --radius-sm: 12px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --danger: #DC3545;
            --success: #28A745;
            --warning: #FFC107;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 20px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* ---------- NAVBAR ---------- */
        .navbar {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: var(--transition);
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .navbar.scrolled { box-shadow: var(--shadow-md); }
        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .logo span {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo i { -webkit-text-fill-color: var(--accent); font-size: 1.4rem; }
        .nav-links {
            display: flex;
            gap: 0.25rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.875rem;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .nav-links a:hover,
        .nav-links a.active {
            background: var(--bg);
            color: var(--primary);
        }
        .nav-links a .nav-icon { font-size: 0.9rem; }
        .nav-cta {
            background: var(--primary) !important;
            color: white !important;
            padding: 0.5rem 1.25rem !important;
            border-radius: 50px !important;
        }
        .nav-cta:hover {
            background: var(--accent) !important;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(221,75,43,0.3);
        }

        /* ---------- BUTTONS ---------- */
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            font-weight: 600;
            padding: 0.7rem 1.6rem;
            border-radius: 50px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        .btn-primary:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(221,75,43,0.3); }
        .btn-secondary {
            background: var(--bg);
            color: var(--text-primary);
            border: 1px solid var(--border);
            font-weight: 600;
            padding: 0.7rem 1.6rem;
            border-radius: 50px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-secondary:hover { background: var(--border); transform: translateY(-2px); }
        .btn-accent {
            background: var(--accent);
            color: white;
            border: none;
            font-weight: 600;
            padding: 0.7rem 1.6rem;
            border-radius: 50px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-accent:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(221,75,43,0.3); }
        .btn-danger {
            background: var(--danger);
            color: white;
            border: none;
            font-weight: 600;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-danger:hover { background: #c82333; transform: translateY(-2px); }
        .btn-success {
            background: var(--success);
            color: white;
            border: none;
            font-weight: 600;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-success:hover { background: #218838; transform: translateY(-2px); }
        .btn-whatsapp {
            background: #25D366;
            color: white;
            border: none;
            font-weight: 600;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        .btn-whatsapp:hover { background: #128C7E; transform: translateY(-2px); }
        .btn-sms {
            background: #34B7F1;
            color: white;
            border: none;
            font-weight: 600;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        .btn-sms:hover { background: #1A8EC4; transform: translateY(-2px); }

        /* ---------- CONTAINER ---------- */
        .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem 2rem; }

        /* ---------- OWNER MESSAGE SECTION ---------- */
        .owner-message-section {
            margin: 0 0 2rem 0;
        }
        .owner-message-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: var(--radius);
            padding: 1.8rem 2rem;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }
        .owner-message-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            pointer-events: none;
        }
        .owner-message-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
            margin-bottom: 0.8rem;
            position: relative;
            z-index: 1;
        }
        .owner-message-header i {
            font-size: 1.2rem;
        }
        .owner-message-content {
            font-size: 1.25rem;
            font-weight: 500;
            line-height: 1.6;
            position: relative;
            z-index: 1;
            min-height: 50px;
            display: flex;
            align-items: center;
        }
        .owner-message-content .message-loading {
            opacity: 0.7;
            font-weight: 400;
        }
        .owner-message-content .message-text {
            animation: fadeInMessage 0.5s ease;
        }
        @keyframes fadeInMessage {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .owner-message-content .message-quote {
            font-size: 1.5rem;
            opacity: 0.3;
            margin-right: 10px;
        }
        .btn-edit-message {
            position: absolute;
            top: 1.2rem;
            right: 1.5rem;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            z-index: 2;
        }
        .btn-edit-message:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-1px);
        }

        /* ---------- HERO ---------- */
        .hero {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: var(--radius);
            padding: 3.5rem 3rem;
            margin-bottom: 2.5rem;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 500px;
            height: 500px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
            pointer-events: none;
        }
        .hero-content { position: relative; z-index: 1; max-width: 600px; }
        .hero h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 0.75rem; line-height: 1.2; }
        .hero p { font-size: 1.1rem; opacity: 0.85; margin-bottom: 1.5rem; line-height: 1.7; }
        .hero .btn-primary { background: white; color: var(--primary); }
        .hero .btn-primary:hover { background: var(--accent); color: white; }

        /* ---------- FEATURES ---------- */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }
        .feature-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.75rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }
        .feature-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            transition: var(--transition);
        }
        .feature-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: transparent; }
        .feature-card.items::after { background: var(--accent); }
        .feature-card.properties::after { background: #2A7F6E; }
        .feature-card.jobs::after { background: #2C6E9E; }
        .feature-card .icon-wrap {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        .feature-card.items .icon-wrap { background: #FDE8E3; color: var(--accent); }
        .feature-card.properties .icon-wrap { background: #E3F0ED; color: #2A7F6E; }
        .feature-card.jobs .icon-wrap { background: #E3EDF5; color: #2C6E9E; }
        .feature-card h3 { font-size: 1.25rem; margin-bottom: 0.5rem; font-weight: 700; }
        .feature-card p { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6; }

        /* ---------- SECTION HEADER ---------- */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .section-header h2 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.3px; display: flex; align-items: center; gap: 10px; }
        .section-header .greeting { font-size: 0.9rem; color: var(--text-secondary); font-weight: 500; }

        /* ---------- SEARCH BAR ---------- */
        .search-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            background: var(--card-bg);
            padding: 1rem 1.25rem;
            border-radius: 60px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            margin-bottom: 2rem;
            align-items: center;
        }
        .search-bar input,
        .search-bar select {
            flex: 1 1 160px;
            padding: 0.6rem 1rem;
            border: 1px solid var(--border);
            border-radius: 40px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            background: var(--bg);
            transition: var(--transition);
            min-width: 120px;
        }
        .search-bar input:focus,
        .search-bar select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(221,75,43,0.1);
        }
        .search-bar .btn-primary { flex: 0 1 auto; }

        /* ---------- LISTINGS GRID ---------- */
        .listings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .listing-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
        }
        .listing-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: transparent; }
        .listing-card .img-wrap {
            width: 100%;
            height: 200px;
            background: var(--bg);
            overflow: hidden;
            position: relative;
        }
        .listing-card .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .listing-card:hover .img-wrap img { transform: scale(1.03); }
        .listing-card .img-wrap .category-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .listing-info { padding: 1.25rem; }
        .listing-title { font-weight: 700; font-size: 1.05rem; margin-bottom: 0.3rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .listing-price { color: var(--accent); font-weight: 800; font-size: 1.2rem; margin: 0.4rem 0; }
        .listing-meta { display: flex; align-items: center; gap: 12px; color: var(--text-secondary); font-size: 0.8rem; flex-wrap: wrap; }
        .listing-meta i { width: 14px; }
        .listing-meta .badge { background: var(--bg); padding: 0.15rem 0.6rem; border-radius: 50px; font-size: 0.7rem; font-weight: 600; color: var(--text-secondary); }
        .contact-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
            flex-wrap: wrap;
        }

        /* ---------- DASHBOARD STATS ---------- */
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.75rem 1.5rem;
            text-align: center;
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .stat-card .stat-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .stat-card h3 { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .stat-card p { color: var(--text-secondary); font-size: 0.85rem; }

        /* ---------- MODAL ---------- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            animation: fadeIn 0.25s ease;
        }
        .modal-overlay.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-content {
            background: var(--card-bg);
            max-width: 560px;
            width: 100%;
            padding: 2rem;
            border-radius: var(--radius);
            box-shadow: 0 40px 60px rgba(0,0,0,0.2);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; }
        .modal-content .close-modal {
            float: right;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: var(--transition);
        }
        .modal-content .close-modal:hover { color: var(--text-primary); transform: rotate(90deg); }

        /* ---------- FORMS ---------- */
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.4rem; color: var(--text-primary); }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: var(--transition);
            background: var(--card-bg);
            color: var(--text-primary);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(221,75,43,0.1);
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-actions { display: flex; gap: 0.75rem; margin-top: 0.5rem; flex-wrap: wrap; }
        .form-actions button { flex: 1; min-width: 120px; justify-content: center; }

        /* ---------- CROPPER STYLES ---------- */
        .cropper-container {
            max-height: 400px;
            margin-bottom: 1rem;
        }
        .cropper-container img {
            max-width: 100%;
            display: block;
        }
        .image-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin: 0.5rem 0 1rem;
        }
        .image-actions button { flex: 1; min-width: 80px; justify-content: center; }

        /* ---------- EDIT MESSAGE FORM ---------- */
        .edit-message-form textarea {
            width: 100%;
            min-height: 120px;
            padding: 0.8rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: var(--transition);
            resize: vertical;
        }
        .edit-message-form textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(221,75,43,0.1);
        }
        .edit-message-form .char-count {
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.3rem;
        }

        /* ---------- EMPTY STATE ---------- */
        .empty-state { text-align: center; padding: 3rem 2rem; background: var(--card-bg); border-radius: var(--radius); border: 1px dashed var(--border); }
        .empty-state .empty-icon { font-size: 3rem; color: var(--border); margin-bottom: 1rem; }
        .empty-state h3 { font-weight: 600; margin-bottom: 0.5rem; }
        .empty-state p { color: var(--text-secondary); margin-bottom: 1.5rem; }

        /* ---------- LOADING ---------- */
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem;
        }
        .loading-spinner i {
            font-size: 2rem;
            color: var(--primary-light);
        }

        /* ---------- TOAST ---------- */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .toast {
            padding: 1rem 1.5rem;
            border-radius: var(--radius-sm);
            color: white;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease;
            min-width: 280px;
        }
        .toast-success { background: var(--success); }
        .toast-error { background: var(--danger); }
        .toast-info { background: var(--primary); }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ---------- FOOTER ---------- */
        footer { text-align: center; padding: 2rem; color: var(--text-secondary); font-size: 0.8rem; border-top: 1px solid var(--border); background: var(--card-bg); margin-top: 2rem; }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 1024px) { .hero { padding: 2.5rem 2rem; } .hero h1 { font-size: 2rem; } }
        @media (max-width: 768px) {
            .navbar { flex-direction: column; align-items: stretch; padding: 0.6rem 1rem; }
            .nav-links { justify-content: center; gap: 0.1rem; flex-wrap: wrap; }
            .nav-links a { font-size: 0.8rem; padding: 0.4rem 0.7rem; }
            .nav-links a .nav-label { display: none; }
            .nav-cta .nav-label { display: inline !important; }
            .container { padding: 1rem; }
            .hero { padding: 2rem 1.5rem; border-radius: var(--radius-sm); }

<!-- JAVASCRIPT -->
<!-- ============================================================ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    // ============================================================
    //  CONFIGURATION
    // ============================================================
    const API_URL ='https://server-v3-9.onrender.com';
    
    // ============================================================
    //  STATE
    // ============================================================
    let currentUser = null;
    let token = localStorage.getItem('token');
    let cropper = null;
    let pendingFormData = null;
    let pendingSection = 'items';
    let editImageData = null;

    // ============================================================
    //  TOAST NOTIFICATIONS
    // ============================================================
    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(100%)';
            setTimeout(() => toast.remove(), 300);
        }, 4000);
    }

    // ============================================================
    //  API CLIENT
    // ============================================================
    async function apiRequest(endpoint, method = 'GET', data = null, isFormData = false) {
        const headers = {};
        const token = localStorage.getItem('token');
        if (token) headers['Authorization'] = `Bearer ${token}`;
        
        const options = { method, headers };
        if (data) {
            if (isFormData) {
                options.body = data;
            } else {
                headers['Content-Type'] = 'application/json';
                options.body = JSON.stringify(data);
            }
        }
        
        try {
            const response = await fetch(`${API_URL}${endpoint}`, options);
            const result = await response.json();
            if (!response.ok) {
                throw new Error(result.error || result.message || 'Request failed');
            }
            return result;
        } catch (error) {
            if (error.message === 'Failed to fetch') {
                showToast('⚠️ Cannot connect to server. Please make sure the backend is running.', 'error');
            } else {
                showToast('❌ ' + error.message, 'error');
            }
            throw error;
        }
    }

    // ============================================================
    //  AUTH FUNCTIONS
    // ============================================================
    async function login(email, password) {
        try {
            const result = await apiRequest('/auth/login', 'POST', { email, password });
            if (result.success) {
                localStorage.setItem('token', result.token);
                localStorage.setItem('user', JSON.stringify(result.user));
                currentUser = result.user;
                updateNavUI();
                showHome();
                showToast('✅ Welcome back, ' + result.user.name + '!', 'success');
                return true;
            }
            return false;
        } catch (error) {
            return false;
        }
    }

    async function register(userData) {
        try {
            const result = await apiRequest('/auth/register', 'POST', userData);
            if (result.success) {
                localStorage.setItem('token', result.token);
                localStorage.setItem('user', JSON.stringify(result.user));
                currentUser = result.user;
                updateNavUI();
                showHome();
                showToast('🎉 Account created! Welcome to NjalaMarket.', 'success');
                return true;
            }
            return false;
        } catch (error) {
            return false;
        }
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        currentUser = null;
        updateNavUI();
        showHome();
        showToast('👋 Logged out successfully', 'info');
    }

    function getCurrentUser() {
        const userStr = localStorage.getItem('user');
        if (userStr) {
            currentUser = JSON.parse(userStr);
            return currentUser;
        }
        return null;
    }

    function updateNavUI() {
        const authLink = document.getElementById('authLink');
        const dashboardLink = document.getElementById('dashboardLink');
        const logoutLink = document.getElementById('logoutLink');
        const isLoggedIn = !!currentUser;
        authLink.style.display = isLoggedIn ? 'none' : 'inline-flex';
        dashboardLink.style.display = isLoggedIn ? 'inline-flex' : 'none';
        logoutLink.style.display = isLoggedIn ? 'inline-flex' : 'none';
        document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    }

    function setActiveNav(id) {
        document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
        const el = document.getElementById(id);
        if (el) el.classList.add('active');
    }

    // ============================================================
    //  MODAL
    // ============================================================
    function openModal(html) {
        const overlay = document.getElementById('modalOverlay');
        const content = document.getElementById('modalContent');
        content.innerHTML = html;
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        if (cropper) { cropper.destroy(); cropper = null; }
        document.getElementById('modalOverlay').classList.remove('active');
        document.body.style.overflow = '';
    }
    document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

    // ============================================================
    //  IMAGE CROPPER
    // ============================================================
    function initCropper(imageUrl) {
        setTimeout(() => {
            const img = document.getElementById('cropImage');
            if (!img) return;
            if (cropper) { cropper.destroy(); cropper = null; }
            cropper = new Cropper(img, {
                aspectRatio: 1,
                viewMode: 1,
                autoCropArea: 0.8,
                responsive: true,
                restore: false,
                guides: true,
                center: true,
                highlight: true,
                cropBoxMovable: true,
                cropBoxResizable: true,
                toggleDragModeOnDblclick: true,
            });
        }, 100);
    }

    function getCroppedImage() {
        if (!cropper) return null;
        return cropper.getCroppedCanvas({
            width: 600,
            height: 600,
            imageSmoothingEnabled: true,
            imageSmoothingQuality: 'high'
        }).toDataURL('image/jpeg', 0.9);
    }

    function getSkippedImage() {
        const img = document.getElementById('cropImage');
        if (!img) return null;
        const canvas = document.createElement('canvas');
        canvas.width = 600;
        canvas.height = 600;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, 600, 600);
        return canvas.toDataURL('image/jpeg', 0.8);
    }

    // ============================================================
    //  OWNER MESSAGE
    // ============================================================
    let ownerMessage = 'Welcome to NjalaMarket! Your trusted marketplace.';

    async function fetchOwnerMessage() {
        const contentDiv = document.getElementById('ownerMessageContent');
        if (!contentDiv) return;
        try {
            const result = await apiRequest('/settings/owner_message');
            ownerMessage = result.value || 'Welcome to NjalaMarket! Your trusted marketplace.';
            contentDiv.innerHTML = `
                <span class="message-quote">"</span>
                <span class="message-text">${ownerMessage}</span>
                <span class="message-quote">"</span>
            `;
        } catch (error) {
            contentDiv.innerHTML = `
                <span class="message-text">Welcome to NjalaMarket! Your trusted marketplace.</span>
            `;
        }
    }

    async function updateOwnerMessage(message) {
        try {
            await apiRequest('/settings', 'POST', { key: 'owner_message', value: message });
            ownerMessage = message;
            renderOwnerMessage();
            showToast('✅ Message updated successfully!', 'success');
            return true;
        } catch (error) {
            showToast('❌ Error updating message: ' + error.message, 'error');
            return false;
        }
    }

    function renderOwnerMessage() {
        const contentDiv = document.getElementById('ownerMessageContent');
        if (!contentDiv) return;
        contentDiv.innerHTML = `
            <span class="message-quote">"</span>
            <span class="message-text">${ownerMessage}</span>
            <span class="message-quote">"</span>
        `;
    }

    function openEditMessageModal() {
        openModal(`
            <h2><i class="fas fa-pen" style="color: var(--accent);"></i> Edit Owner Message</h2>
            <form id="editMessageForm" class="edit-message-form">
                <div class="form-group">
                    <label>Message to display on the website</label>
                    <textarea id="messageInput" placeholder="Enter your message here..." maxlength="500">${ownerMessage}</textarea>
                    <div class="char-count"><span id="charCount">${ownerMessage.length}</span>/500 characters</div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Update Message</button>
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        `);
        const textarea = document.getElementById('messageInput');
        const charCount = document.getElementById('charCount');
        if (textarea) {
            textarea.addEventListener('input', function() {
                charCount.textContent = this.value.length;
            });
        }
        document.getElementById('editMessageForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = document.getElementById('messageInput').value.trim();
            if (!message) { showToast('Please enter a message', 'error'); return; }
            await updateOwnerMessage(message);
            closeModal();
        });
    }

    // ============================================================
    //  RENDER FUNCTIONS
    // ============================================================
    function renderListingCard(item, showActions = false) {

                <button class="btn-danger" onclick="deleteListing('${type}', '${item._id}')"><i class="fas fa-trash"></i> Delete</button>
            </div>
        ` : '';

        const contactHtml = `
            <div class="contact-actions">

        if (type === 'product') {

                <span class="badge"><i class="far fa-eye"></i> ${item.views || 0}</span>

                <span><i class="fas fa-map-marker-alt"></i> ${item.location}</span>
                <span><i class="fas fa-bed"></i> ${item.bedrooms || 0} beds</span>

                <i class="fas fa-building" style="font-size: 2.5rem; opacity: 0.6;"></i>
            </div>`;

                    ${contactHtml}

                </div>
            </div>
        `;
    }

    // ============================================================
    //  DETAIL VIEW

                    <div class="form-group"><label>Views</label><div><i class="far fa-eye"></i> ${item.views || 0}</div></div>
                `;
            } else if (type === 'property') {

    async function applySearch() {
        const query = document.getElementById('searchQuery').value.toLowerCase().trim();
        const category = document.getElementById('searchCategory').value;
        const location = document.getElementById('searchLocation').value.toLowerCase().trim();

        try {
            const [products, properties, jobs] = await Promise.all([
                apiRequest('/products'),
                apiRequest('/properties'),
                apiRequest('/jobs')
            ]);

            let all = [
                ...(products.products || []).map(p => ({ ...p, type: 'product' })),
                ...(properties.properties || []).map(p => ({ ...p, type: 'property' })),
                ...(jobs.jobs || []).map(j => ({ ...j, type: 'job' }))
            ];

            if (query) {
                all = all.filter(item => item.title.toLowerCase().includes(query) || (item.company && item.company.toLowerCase().includes(query)));
            }
            if (category) {
                all = all.filter(item => {
                    if (item.type === 'product') return item.category === category;
                    if (item.type === 'property') return item.listingType === category || item.type === category;
                    if (item.type === 'job') return item.employmentType === category;
                    return false;
                });
            }
            if (location) {
                all = all.filter(item => item.location.toLowerCase().includes(location));
            }

            const grid = document.getElementById('searchResults');
            if (all.length === 0) {
                grid.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-search"></i></div><h3>No matches found</h3><p>Try adjusting your search filters.</p></div>`;
            } else {
                grid.innerHTML = all.map(item => renderListingCard(item, false)).join('');
            }
        } catch (error) {
            showToast('Error searching listings', 'error');
        }
    }

                <div class="form-group"><label>Phone *</label><input name="phone" placeholder="0999123456" required /></div>
                <div class="form-group"><label>District</label><input name="district" placeholder="e.g. Lilongwe" /></div>
                <div class="form-group"><label>Password *</label><input type="password" name="password" placeholder="Min 6 characters" required minlength="6" /></div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary"><i class="fas fa-user-check"></i> Register</button>
                    <button type="button" class="btn-secondary" onclick="showAuth()">Back to Login</button>
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        `);

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = Object.fromEntries(fd.entries());
            const success = await register(data);
            if (success) closeModal();
        });
    }

    // ============================================================
    //  DASHBOARD
    // ============================================================
    async function showDashboard() {
        if (!currentUser) { showAuth(); return; }
        setActiveNav('dashboardLink');

        document.getElementById('app').innerHTML = `
            <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading dashboard...</div>
        `;

        try {
            const result = await apiRequest('/dashboard');
            const { stats, products, properties, jobs } = result;

            let productsHtml = products.length === 0 
                ? `<div class="empty-state"><div class="empty-icon"><i class="fas fa-box-open"></i></div><h3>No products yet</h3><p>Start selling today!</p></div>`
                : products.map(p => renderListingCard({ ...p, type: 'product' }, true)).join('');

            document.getElementById('app').innerHTML = `
                <div class="section-header"><h2>📊 Dashboard</h2><span class="greeting">Welcome, ${currentUser.name}</span></div>
                <div class="dashboard-stats">
                    <div class="stat-card"><div class="stat-icon" style="color: var(--accent);"><i class="fas fa-box"></i></div><h3>${stats.products}</h3><p>Items for Sale</p></div>
                    <div class="stat-card"><div class="stat-icon" style="color: #2A7F6E;"><i class="fas fa-building"></i></div><h3>${stats.properties}</h3><p>Properties Listed</p></div>
                    <div class="stat-card"><div class="stat-icon" style="color: #2C6E9E;"><i class="fas fa-bullhorn"></i></div><h3>${stats.jobs}</h3><p>Job Posts</p></div>
                </div>
                <div style="display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem;">
                    <button class="btn-primary" onclick="showPostForm('items')"><i class="fas fa-plus"></i> New Item</button>
                    <button class="btn-primary" onclick="showPostForm('properties')"><i class="fas fa-plus"></i> New Property</button>
                    <button class="btn-primary" onclick="showPostForm('jobs')"><i class="fas fa-plus"></i> New Job</button>
                    <button class="btn-secondary" onclick="showHome()"><i class="fas fa-arrow-left"></i> Back</button>
                </div>
                <div class="section-header"><h3>📦 Your Products</h3></div>
                <div class="listings-grid">${productsHtml}</div>
            `;
        } catch (error) {
            document.getElementById('app').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div>
                    <h3>Unable to load dashboard</h3>
                    <button class="btn-primary" onclick="showDashboard()"><i class="fas fa-refresh"></i> Retry</button>
                </div>
            `;
        }
    }

    // ============================================================
    //  LOGOUT
    // ============================================================
    function handleLogout() {
        if (confirm('Are you sure you want to logout?')) {
            logout();
        }
    }

    // ============================================================
    //  INIT
    // ============================================================
    getCurrentUser();
    updateNavUI();
    showHome();

    window.addEventListener('scroll', () => {
        document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 10);
    });

    // Global exposure
    window.showHome = showHome;
    window.showSection = showSection;
    window.showPostForm = showPostForm;
    window.showAuth = showAuth;
    window.showRegisterForm = showRegisterForm;
    window.showDashboard = showDashboard;
    window.handleLogout = handleLogout;
    window.closeModal = closeModal;
    window.applySearch = applySearch;
    window.clearSearch = clearSearch;
    window.applySectionSearch = applySectionSearch;
    window.editListing = editListing;
    window.deleteListing = deleteListing;
    window.confirmCrop = confirmCrop;
    window.skipCrop = skipCrop;
    window.cancelImage = cancelImage;
    window.initCropper = initCropper;
    window.getCroppedImage = getCroppedImage;
    window.getSkippedImage = getSkippedImage;
    window.fetchOwnerMessage = fetchOwnerMessage;
    window.openEditMessageModal = openEditMessageModal;
    window.showDetail = showDetail;
    window.showToast = showToast;
</script>
</body>
</html>
