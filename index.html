        document.getElementById('videoCallOverlay').classList.add('active');
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                localStream = stream;
                document.getElementById('localVideo').srcObject = stream;
            })
            .catch(err => {
                showToast('Could not access camera/mic: ' + err.message, 'error');
                endCall();
            });
    }

    function acceptCall() {
        if (!incomingCallData) return;
        document.getElementById('incomingCall').classList.remove('active');
        const { from } = incomingCallData;

        socket.emit('call_accepted', { to: from });
        callInProgress = true;
        isCaller = false;
        document.getElementById('videoCallOverlay').classList.add('active');

        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                localStream = stream;
                document.getElementById('localVideo').srcObject = stream;
                createPeerConnection(from);
            })
            .catch(err => {
                showToast('Could not access media: ' + err.message, 'error');
                endCall();
            });
        incomingCallData = null;
    }

    function declineCall() {
        if (!incomingCallData) return;
        socket.emit('call_declined', { to: incomingCallData.from });
        document.getElementById('incomingCall').classList.remove('active');
        incomingCallData = null;
    }

    function initiateCall(toUserId) {
        createPeerConnection(toUserId);
        peerConnection.createOffer()
            .then(offer => peerConnection.setLocalDescription(offer))
            .then(() => {
                socket.emit('webrtc_offer', { to: toUserId, sdp: peerConnection.localDescription });
            })
            .catch(err => console.error('Error creating offer:', err));
    }

    function createPeerConnection(otherUserId) {
        const config = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                {
                    urls: 'turn:openrelay.metered.ca:80',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                },
                {
                    urls: 'turn:openrelay.metered.ca:443',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                }
            ]
        };
        peerConnection = new RTCPeerConnection(config);

        if (localStream) {
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
        }

        peerConnection.ontrack = (event) => {
            console.log('📡 Remote track received:', event.track.kind);
            if (!remoteStream) {
                remoteStream = new MediaStream();
                document.getElementById('remoteVideo').srcObject = remoteStream;
            }
            remoteStream.addTrack(event.track);
            document.getElementById('remoteVideo').play().catch(e => console.log('Play error:', e));
        };

        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                console.log('🧊 Sending ICE candidate');
                socket.emit('webrtc_ice', { to: otherUserId, candidate: event.candidate });
            }
        };

        peerConnection.oniceconnectionstatechange = () => {
            console.log('🔗 ICE state:', peerConnection.iceConnectionState);
            if (peerConnection.iceConnectionState === 'disconnected' ||
                peerConnection.iceConnectionState === 'failed') {
                endCall();
                showToast('Call disconnected', 'error');
            }
        };

        peerConnection.onnegotiationneeded = () => {
            console.log('🔄 Negotiation needed');
        };
    }

    async function handleWebRTCAnswer(from, sdp) {
        if (!peerConnection) {
            createPeerConnection(from);
        }
        try {
            console.log('📥 Setting remote description');
            await peerConnection.setRemoteDescription(new RTCSessionDescription(sdp));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            console.log('📤 Sending answer');
            socket.emit('webrtc_answer', { 
                to: from, 
                sdp: peerConnection.localDescription 
            });
        } catch (e) {
            console.error('❌ Error handling WebRTC answer:', e);
            showToast('Error connecting call', 'error');
        }
    }

    function toggleMute() {
        if (!localStream) return;
        const audioTrack = localStream.getAudioTracks()[0];
        if (audioTrack) {
            audioTrack.enabled = !audioTrack.enabled;
            const btn = document.querySelector('.btn-mute-toggle');
            btn.innerHTML = audioTrack.enabled ? '<i class="fas fa-microphone"></i> Mute' : '<i class="fas fa-microphone-slash"></i> Unmute';
        }
    }

    function endCall() {
        console.log('📞 Ending call');
        callInProgress = false;
        isCaller = false;
        
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        
        if (remoteStream) {
            remoteStream.getTracks().forEach(track => track.stop());
            remoteStream = null;
        }
        
        document.getElementById('remoteVideo').srcObject = null;
        document.getElementById('localVideo').srcObject = null;
        document.getElementById('videoCallOverlay').classList.remove('active');
        document.getElementById('incomingCall').classList.remove('active');
        
        if (socket && currentChatUser) {
            socket.emit('call_ended', { to: currentChatUser._id });
        }
        showToast('📞 Call ended', 'info');
    }

    function showForgotPassword() {
        openModal(`
            <h2><i class="fas fa-key" style="color: var(--warning);"></i> Reset Password</h2>
            <p style="color: var(--text-secondary); margin-bottom: 0.8rem; font-size:0.9rem;">Enter your phone number to receive a reset code via SMS.</p>
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="resetPhone" placeholder="0999123456" required />
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary" id="sendCodeBtn"><i class="fas fa-paper-plane"></i> <span class="btn-text">Send Code</span></button>
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
            <div id="resetCodeSection" style="display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border);">
                <p style="color: var(--text-secondary); margin-bottom: 0.8rem; font-size:0.9rem;">Enter the 6-digit code sent to your phone.</p>
                <form id="verifyCodeForm">
                    <div class="form-group"><label>Reset Code *</label><input type="text" id="resetCode" placeholder="123456" maxlength="6" required /></div>
                    <div class="form-group"><label>New Password (optional)</label><input type="password" id="newPassword" placeholder="Leave blank to keep old password" minlength="6" /></div>
                    <div class="form-group" style="display: flex; gap: 0.4rem; align-items: center;">
                        <input type="checkbox" id="keepOldPassword" style="width: auto; min-height: auto;" />
                        <label for="keepOldPassword" style="margin: 0; font-weight: 400; font-size: 0.8rem;">Keep my old password</label>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary" id="resetPwdBtn"><i class="fas fa-check"></i> <span class="btn-text">Reset Password</span></button>
                        <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                    </div>
                </form>
            </div>
        `);
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('sendCodeBtn');
            setButtonLoading(btn, true, 'Sending...');
            const phone = document.getElementById('resetPhone').value.trim();
            if (!phone) { showToast('Please enter your phone number', 'error'); setButtonLoading(btn, false); return; }
            if (!phone.match(/^[0-9]{10,12}$/)) {
                showToast('Please enter a valid phone number (e.g. 0999123456)', 'error');
                setButtonLoading(btn, false);
                return;
            }
            try {
                const result = await apiRequest('/api/auth/forgot-password', 'POST', { phone });
                if (result.success) {
                    resetPhone = phone;
                    setButtonLoading(btn, false);
                    showToast('✅ Reset code sent to your phone!', 'success');
                    document.getElementById('resetCodeSection').style.display = 'block';
                }
            } catch (error) {
                setButtonLoading(btn, false);
                showToast('❌ ' + error.message, 'error');
            }
        });
        document.getElementById('verifyCodeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('resetPwdBtn');
            setButtonLoading(btn, true, 'Resetting...');
            const code = document.getElementById('resetCode').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const keepOldPassword = document.getElementById('keepOldPassword').checked;
            if (!code) { showToast('Please enter the reset code', 'error'); setButtonLoading(btn, false); return; }
            if (!keepOldPassword && !newPassword) {
                showToast('Please enter a new password or check "Keep my old password"', 'error');
                setButtonLoading(btn, false);
                return;
            }
            try {
                const verifyResult = await apiRequest('/api/auth/verify-reset-code', 'POST', { phone: resetPhone, code });
                if (verifyResult.success) {
                    const resetResult = await apiRequest('/api/auth/reset-password', 'POST', {
                        phone: resetPhone,
                        code,
                        newPassword: keepOldPassword ? undefined : newPassword,
                        keepOldPassword
                    });
                    if (resetResult.success) {
                        setButtonLoading(btn, false);
                        if (resetResult.keepOld) {
                            showToast('✅ You can continue using your old password', 'success');
                        } else {
                            showToast('✅ Password changed successfully!', 'success');
                        }
                        closeModal();
                    }
                }
            } catch (error) {
                setButtonLoading(btn, false);
                showToast('❌ ' + error.message, 'error');
            }
        });
    }

                    <button type="button" class="btn-secondary" style="font-size: 0.7rem; padding: 0.15rem 0.5rem; background: none; border: none; color: var(--accent); min-height: auto;" onclick="showForgotPassword(); closeModal();">
                        <i class="fas fa-key"></i> Forgot Password?
                    </button>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary" id="loginBtn"><i class="fas fa-arrow-right"></i> <span class="btn-text">Sign In</span></button>
                    <button type="button" class="btn-secondary" onclick="showRegisterForm()">Create Account</button>
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        `);
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const phone = document.getElementById('loginPhone').value.trim();
            const password = document.getElementById('loginPassword').value;
            const success = await login(phone, password, btn);
            if (success) closeModal();
        });
    }

    function showRegisterForm() {
        openModal(`
            <h2><i class="fas fa-user-plus" style="color: var(--success);"></i> Join NjalaMarket</h2>
            <form id="registerForm">
                <div class="form-group"><label>Full Name *</label><input name="name" placeholder="e.g. Thandiwe Mwale" required /></div>
                <div class="form-group"><label>Phone Number *</label><input name="phone" placeholder="0999123456" required /></div>
                <div class="form-group"><label>District</label><input name="district" placeholder="e.g. Lilongwe" /></div>
                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender"><option value="">Select...</option><option>Male</option><option>Female</option><option>Other</option></select>
                </div>
                <div class="form-group"><label>Password *</label><input type="password" name="password" placeholder="Min 6 characters" required minlength="6" /></div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary" id="registerBtn"><i class="fas fa-user-check"></i> <span class="btn-text">Register</span></button>
                    <button type="button" class="btn-secondary" onclick="showAuth()">Back to Login</button>
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        `);
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const fd = new FormData(e.target);
            const data = Object.fromEntries(fd.entries());
            const success = await register(data, btn);
            if (success) closeModal();
        });
    }

    // ============================================================
    // DASHBOARD
    // ============================================================
    async function showDashboard() {
        if (!currentUser) { showAuth(); return; }
        currentView = 'dashboard';
        isLoading = true;
        setActiveNav('dashboardLink');
        document.getElementById('pageTitle').innerHTML = '<i class="fas fa-chart-simple"></i> My Listings';

        document.getElementById('app').innerHTML = `
            <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i><span>Loading dashboard...</span></div>
        `;

        try {
            const result = await apiRequest('/api/dashboard');
            const { stats, products, properties, jobs } = result;

            const allMyListings = [
                ...(products || []).map(p => ({ ...p, type: 'product' })),
                ...(properties || []).map(p => ({ ...p, type: 'property' })),
                ...(jobs || []).map(j => ({ ...j, type: 'job' }))
            ];

            let listingsHtml;
            if (allMyListings.length === 0) {
                listingsHtml = `
                    <div class="empty-state">
                        <div class="empty-icon"><i class="fas fa-box-open"></i></div>
                        <h3>You haven't posted anything yet</h3>
                        <p>Start selling, renting, or hiring today!</p>
                    </div>
                `;
            } else {
                listingsHtml = allMyListings.map(item => renderListingCard(item, true)).join('');
            }

            document.getElementById('app').innerHTML = `
                <div class="section-header"><h2>📊 Dashboard</h2><span class="greeting">Welcome, ${currentUser.name}</span></div>
                <div class="dashboard-stats">
                    <div class="stat-card"><div class="stat-icon" style="color: var(--accent);"><i class="fas fa-box"></i></div><h3>${stats.products}</h3><p>Items for Sale</p></div>
                    <div class="stat-card"><div class="stat-icon" style="color: #0D9488;"><i class="fas fa-building"></i></div><h3>${stats.properties}</h3><p>Properties Listed</p></div>
                    <div class="stat-card"><div class="stat-icon" style="color: #2563EB;"><i class="fas fa-bullhorn"></i></div><h3>${stats.jobs}</h3><p>Job Posts</p></div>
                </div>
                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.25rem;">
                    <button class="btn-primary" onclick="showPostForm('items')" style="font-size:0.8rem;padding:0.4rem 1rem;"><i class="fas fa-plus"></i> New Item</button>
                    <button class="btn-primary" onclick="showPostForm('properties')" style="font-size:0.8rem;padding:0.4rem 1rem;"><i class="fas fa-plus"></i> New Property</button>
                    <button class="btn-primary" onclick="showPostForm('jobs')" style="font-size:0.8rem;padding:0.4rem 1rem;"><i class="fas fa-plus"></i> New Job</button>
                    <button class="btn-secondary" onclick="navigateTo('home')" style="font-size:0.8rem;padding:0.4rem 1rem;"><i class="fas fa-arrow-left"></i> Back</button>
                </div>
                <div class="section-header"><h3>📋 Your Listings</h3></div>
                <div class="listings-grid">${listingsHtml}</div>
            `;
            isLoading = false;
        } catch (error) {
            isLoading = false;
            document.getElementById('app').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div>
                    <h3>Unable to load dashboard</h3>
                    <button class="btn-primary" onclick="navigateTo('dashboard')"><i class="fas fa-refresh"></i> Retry</button>
                </div>
            `;
        }
        updateBackButton();
    }

    // ============================================================
    // LOGOUT
    // ============================================================
    function handleLogout() {
        if (confirm('Are you sure you want to logout?')) {
            logout();
        }
    }

    // ============================================================
    // PWA - Service Worker Registration
    // ============================================================
    if ('serviceWorker' in navigator) {
        const swCode = `
            self.addEventListener('install', e => {
                e.waitUntil(
                    caches.open('njalamarket-v3').then(cache => {
                        return cache.addAll([
                            '/',
                            '/index.html',
                            'https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap',
                            'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css',
                            'https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css'
                        ]);
                    })
                );
            });
            self.addEventListener('fetch', e => {
                e.respondWith(
                    caches.match(e.request).then(response => response || fetch(e.request))
                );
            });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl)
            .then(() => console.log('Service Worker registered'))
            .catch(err => console.log('SW registration failed:', err));
    }

    // ============================================================
    // INIT
    // ============================================================
    getCurrentUser();
    updateSidebarUI();
    if (currentUser) {
        initSocket();
    }
    
    const hash = window.location.hash.replace('#', '');
    if (hash && ['home', 'items', 'properties', 'jobs', 'dashboard', 'users', 'friends', 'chat', 'notifications'].includes(hash)) {
        navigateTo(hash);
    } else {
        navigateTo('home');
    }

    // Expose functions globally
    window.navigateTo = navigateTo;
    window.goBack = goBack;
    window.startChat = startChat;
    window.selectChatUser = selectChatUser;
    window.sendChatMessage = sendChatMessage;
    window.markChatRead = markChatRead;
    window.markNotificationRead = markNotificationRead;
    window.markAllNotificationsRead = markAllNotificationsRead;
    window.deleteNotification = deleteNotification;
    window.deleteMessage = deleteMessage;
    window.startVideoCall = startVideoCall;
    window.acceptCall = acceptCall;
    window.declineCall = declineCall;
    window.endCall = endCall;
    window.toggleMute = toggleMute;
    window.showHome = showHome;
    window.showSection = showSection;
    window.showPostForm = showPostForm;
    window.showAuth = showAuth;
    window.showRegisterForm = showRegisterForm;
    window.showDashboard = showDashboard;
    window.showAllUsers = showAllUsers;
    window.showFriends = showFriends;
    window.showChat = showChat;
    window.showNotifications = showNotifications;
    window.openProfileSettings = openProfileSettings;
    window.openContactOwner = openContactOwner;
    window.handleLogout = handleLogout;
    window.closeModal = closeModal;
    window.toggleSidebar = toggleSidebar;
    window.closeSidebar = closeSidebar;
    window.applySearch = applySearch;
    window.clearSearch = clearSearch;
    window.applySectionSearch = applySectionSearch;
    window.editListing = editListing;
    window.deleteListing = deleteListing;
    window.confirmCrop = confirmCrop;
    window.skipCrop = skipCrop;
    window.cancelImage = cancelImage;
    window.initCropper = initCropper;
    window.getCroppedImage = getCroppedImage;
    window.getSkippedImage = getSkippedImage;
    window.fetchOwnerMessage = fetchOwnerMessage;
    window.openEditMessageModal = openEditMessageModal;
    window.showDetail = showDetail;
    window.showToast = showToast;
    window.confirmDeleteAccount = confirmDeleteAccount;
    window.showForgotPassword = showForgotPassword;
    window.setButtonLoading = setButtonLoading;
</script>
</body>
</html>
