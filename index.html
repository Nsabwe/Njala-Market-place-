<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>NjalaMarket | Malawi's Premier Marketplace</title>
    <meta name="description" content="NjalaMarket – Buy, sell, rent, and find jobs across Malawi. Trusted marketplace." />
    <link rel="canonical" href="https://njalamarket.com" />
    <meta name="theme-color" content="#0F2F40" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <script src="https://cdn.socket.io/4.7.0/socket.io.min.js"></script>
    <style>
        /* ===== RESET & ROOT ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0A1E2F;
            --primary-light: #1A3A4F;
            --primary-dark: #060F1A;
            --accent: #E05A3A;
            --accent-hover: #C44A2E;
            --accent-light: #FDF0EB;
            --bg: #F0F2F5;
            --card: #FFFFFF;
            --text: #111827;
            --text-secondary: #6B7280;
            --text-light: #9CA3AF;
            --border: #E5E7EB;
            --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.1);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --danger: #DC2626;
            --success: #16A34A;
            --warning: #F59E0B;
            --sidebar-width: 280px;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        html, body { height: 100%; overflow-x: hidden; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            display: flex;
            min-height: 100vh;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 10px; }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed; top: 0; left: 0; bottom: 0;
            width: var(--sidebar-width);
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 1.25rem 1rem;
            padding-top: calc(1.25rem + var(--safe-top));
            padding-bottom: calc(1.25rem + var(--safe-bottom));
            overflow-y: auto;
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header .logo {
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
        }
        .sidebar-header .logo span { color: var(--accent); }
        .sidebar-header .logo i { color: var(--accent); font-size: 1.2rem; }
        .sidebar-close {
            background: none; border: none;
            font-size: 1.3rem; color: var(--text-secondary);
            cursor: pointer; padding: 0.2rem;
            transition: var(--transition);
        }
        .sidebar-close:hover { color: var(--text); transform: rotate(90deg); }

        .sidebar .profile-section {
            text-align: center;
            padding: 1rem;
            margin-bottom: 1.5rem;
            background: var(--bg);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }
        .sidebar .profile-avatar {
            width: 72px; height: 72px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            margin: 0 auto 0.5rem;
            cursor: pointer;
            transition: var(--transition);
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--text-secondary);
            overflow: hidden;
        }
        .sidebar .profile-avatar:hover { transform: scale(1.05); }
        .sidebar .profile-name { font-weight: 700; font-size: 1rem; }
        .sidebar .profile-phone { font-size: 0.8rem; color: var(--text-secondary); }
        .sidebar .profile-location { font-size: 0.8rem; color: var(--text-secondary); }
        .sidebar .profile-gender { font-size: 0.8rem; color: var(--text-secondary); }

        .sidebar .nav-section { margin-bottom: 1.25rem; }
        .sidebar .nav-section h4 {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-light);
            margin-bottom: 0.4rem;
            font-weight: 700;
        }
        .sidebar .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.6rem 0.8rem;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.85rem;
            transition: var(--transition);
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }
        .sidebar .nav-item:hover { background: var(--bg); color: var(--text); }
        .sidebar .nav-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(10,30,47,0.2);
        }
        .sidebar .nav-item i { width: 20px; text-align: center; font-size: 0.95rem; }
        .sidebar .nav-item .badge {
            margin-left: auto;
            background: var(--accent);
            color: white;
            font-size: 0.6rem;
            padding: 0.1rem 0.5rem;
            border-radius: 20px;
            font-weight: 700;
        }
        .sidebar .nav-item .badge-success { background: var(--success); }

        /* ===== SIDEBAR OVERLAY ===== */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            z-index: 999;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .sidebar-overlay.active { display: block; }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            padding: 0.75rem 1rem 1.5rem;
            min-height: 100vh;
            width: 100%;
            padding-top: calc(0.75rem + var(--safe-top));
            padding-bottom: calc(1.5rem + var(--safe-bottom));
        }

        /* ===== TOPBAR ===== */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
            gap: 0.5rem;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
            padding: 0.4rem 0;
            padding-top: calc(0.4rem + var(--safe-top));
            border-bottom: 1px solid var(--border);
        }
        .topbar .hamburger {
            display: flex;
            background: none; border: none;
            font-size: 1.3rem;
            color: var(--text);
            cursor: pointer;
            padding: 0.3rem;
            transition: var(--transition);
        }
        .topbar .hamburger:hover { color: var(--accent); }
        .topbar .page-title {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .topbar .page-title i { color: var(--accent); margin-right: 6px; }
        .topbar .top-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .topbar .top-actions .notification-bell {
            position: relative;
            font-size: 1rem;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.4rem 0.5rem;
            border-radius: 50%;
            transition: var(--transition);
            background: var(--card);
            border: 1px solid var(--border);
        }
        .topbar .top-actions .notification-bell:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .topbar .top-actions .notification-bell .notif-dot {
            position: absolute;
            top: 3px; right: 3px;
            width: 8px; height: 8px;
            background: var(--danger);
            border-radius: 50%;
            border: 2px solid var(--card);
            display: none;
        }

        /* ===== BUTTONS ===== */
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            font-weight: 600;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            min-height: 40px;
            justify-content: center;
            box-shadow: 0 2px 10px rgba(10,30,47,0.15);
        }
        .btn-primary:hover:not(:disabled) {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(224,90,58,0.3);
        }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-primary .spinner {
            display: none;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .btn-primary.loading .spinner { display: inline-block; }
        .btn-primary.loading .btn-text { opacity: 0.7; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-secondary {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            font-weight: 600;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 40px;
            justify-content: center;
        }
        .btn-secondary:hover:not(:disabled) {
            border-color: var(--primary);
            background: var(--bg);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            border: none;
            font-weight: 600;
            padding: 0.3rem 0.9rem;
            border-radius: 50px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 34px;
            justify-content: center;
        }
        .btn-danger:hover:not(:disabled) { background: #B91C1C; transform: translateY(-2px); }

        .btn-success {
            background: var(--success);
            color: white;
            border: none;
            font-weight: 600;
            padding: 0.3rem 0.9rem;
            border-radius: 50px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 34px;
            justify-content: center;
        }
        .btn-success:hover:not(:disabled) { background: #15803D; transform: translateY(-2px); }

        .btn-whatsapp {
            background: #25D366;
            color: white;
            border: none;
            font-weight: 600;
            padding: 0.3rem 0.9rem;
            border-radius: 50px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            min-height: 34px;
            justify-content: center;
        }
        .btn-whatsapp:hover { background: #128C7E; transform: translateY(-2px); }
        .btn-sms {
            background: #34B7F1;
            color: white;
            border: none;
            font-weight: 600;
            padding: 0.3rem 0.9rem;
            border-radius: 50px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            min-height: 34px;
            justify-content: center;
        }
        .btn-sms:hover { background: #1A8EC4; transform: translateY(-2px); }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            padding: 0.2rem 0.5rem;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            font-weight: 500;
        }
        .back-button:hover { background: var(--bg); color: var(--text); }

        /* ===== CONTAINER ===== */
        .container { max-width: 1200px; margin: 0 auto; }

        /* ===== OWNER MESSAGE ===== */
        .owner-message-section { margin-bottom: 1.5rem; }
        .owner-message-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: var(--radius);
            padding: 1.5rem 1.75rem;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }
        .owner-message-card::before {
            content: '';
            position: absolute;
            top: -40%; right: -10%;
            width: 250px; height: 250px;
            background: rgba(255,255,255,0.04);
            border-radius: 50%;
            pointer-events: none;
        }
        .owner-message-card::after {
            content: '"';
            position: absolute;
            bottom: -15px; right: 15px;
            font-size: 6rem;
            opacity: 0.05;
            font-family: Georgia, serif;
            color: white;
            pointer-events: none;
        }
        .owner-message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            opacity: 0.7;
            margin-bottom: 0.4rem;
            position: relative;
            z-index: 1;
        }
        .owner-message-header i { font-size: 0.9rem; }
        .owner-message-content {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.6;
            position: relative;
            z-index: 1;
            min-height: 36px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-style: italic;
        }
        .owner-message-content .message-loading { opacity: 0.6; font-weight: 400; font-style: normal; }
        .owner-message-content .message-text { animation: fadeInMessage 0.4s ease; }
        @keyframes fadeInMessage {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .owner-message-content .message-quote { font-size: 1.2rem; opacity: 0.25; }
        .btn-edit-message {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            padding: 0.25rem 0.8rem;
            border-radius: 50px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(8px);
            z-index: 2;
            margin-top: 0.6rem;
        }
        .btn-edit-message:hover { background: rgba(255,255,255,0.2); }

        /* ===== HERO ===== */
        .hero {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%);
            border-radius: var(--radius);
            padding: 2.5rem 2rem;
            margin-bottom: 2rem;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -50%; right: -15%;
            width: 350px; height: 350px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
            pointer-events: none;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: -40%; left: -5%;
            width: 250px; height: 250px;
            background: rgba(255,255,255,0.02);
            border-radius: 50%;
            pointer-events: none;
        }
        .hero-content { position: relative; z-index: 1; max-width: 100%; }
        .hero h1 {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: -0.8px;
            margin-bottom: 0.4rem;
            line-height: 1.15;
        }
        .hero p {
            font-size: 0.95rem;
            opacity: 0.8;
            margin-bottom: 1.25rem;
            line-height: 1.6;
            max-width: 520px;
        }
        .hero .btn-primary {
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .hero .btn-primary:hover {
            background: var(--accent);
            color: white;
            box-shadow: 0 6px 24px rgba(224,90,58,0.35);
        }

        /* ===== FEATURES ===== */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .feature-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 1.5rem 1.25rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-xs);
            position: relative;
            overflow: hidden;
        }
        .feature-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            transition: var(--transition);
        }
        .feature-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: transparent;
        }
        .feature-card.items::after { background: var(--accent); }
        .feature-card.properties::after { background: #0D9488; }
        .feature-card.jobs::after { background: #2563EB; }
        .feature-card .icon-wrap {
            width: 48px; height: 48px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-bottom: 0.6rem;
            transition: var(--transition);
        }
        .feature-card:hover .icon-wrap { transform: scale(1.1); }
        .feature-card.items .icon-wrap { background: var(--accent-light); color: var(--accent); }
        .feature-card.properties .icon-wrap { background: #E6F7F5; color: #0D9488; }
        .feature-card.jobs .icon-wrap { background: #E6EEFF; color: #2563EB; }
        .feature-card h3 { font-size: 1rem; margin-bottom: 0.3rem; font-weight: 700; }
        .feature-card p { color: var(--text-secondary); font-size: 0.8rem; line-height: 1.5; }

        /* ===== SECTION HEADER ===== */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.6rem;
        }
        .section-header h2 {
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .section-header .greeting {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
            background: var(--card);
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            border: 1px solid var(--border);
        }

        /* ===== SEARCH BAR ===== */
        .search-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            background: var(--card);
            padding: 0.6rem 1rem;
            border-radius: 60px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            margin-bottom: 1.25rem;
            align-items: center;
            transition: var(--transition);
        }
        .search-bar:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(224,90,58,0.08);
        }
        .search-bar input,
        .search-bar select {
            flex: 1 1 120px;
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 40px;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            background: var(--bg);
            transition: var(--transition);
            min-width: 80px;
            min-height: 36px;
        }
        .search-bar input:focus,
        .search-bar select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(224,90,58,0.08);
        }
        .search-bar .btn-primary,
        .search-bar .btn-secondary {
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            min-height: 36px;
            flex: 0 1 auto;
        }

        /* ===== LISTINGS GRID ===== */
        .listings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
            margin-bottom: 1.25rem;
        }
        .listing-card {
            background: var(--card);
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-xs);
            cursor: pointer;
        }
        .listing-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: transparent;
        }
        .listing-card .img-wrap {
            width: 100%;
            height: 180px;
            background: var(--bg);
            overflow: hidden;
            position: relative;
        }
        .listing-card .img-wrap img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .listing-card:hover .img-wrap img { transform: scale(1.05); }
        .listing-card .img-wrap .category-badge {
            position: absolute;
            top: 10px; left: 10px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            color: white;
            padding: 0.1rem 0.6rem;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .listing-info { padding: 0.9rem 1rem; }
        .listing-title {
            font-weight: 700;
            font-size: 0.9rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }
        .listing-price {
            color: var(--accent);
            font-weight: 800;
            font-size: 1.05rem;
            margin: 0.2rem 0;
        }
        .listing-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 0.7rem;
            flex-wrap: wrap;
        }
        .listing-meta i { width: 12px; }
        .listing-meta .badge {
            background: var(--bg);
            padding: 0.05rem 0.4rem;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .contact-actions {
            display: flex;
            gap: 0.3rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        .listing-card .poster-info {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
        }
        .listing-card .poster-info img {
            width: 24px; height: 24px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg);
        }
        .listing-card .poster-info .poster-name {
            font-weight: 600;
            font-size: 0.75rem;
            color: var(--text);
        }

        /* ===== DASHBOARD STATS ===== */
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.8rem;
            margin-bottom: 1.25rem;
        }
        .stat-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 1.25rem 1rem;
            text-align: center;
            border: 1px solid var(--border);
            transition: var(--transition);
            box-shadow: var(--shadow-xs);
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }
        .stat-card .stat-icon { font-size: 1.5rem; margin-bottom: 0.2rem; }
        .stat-card h3 { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        .stat-card p { color: var(--text-secondary); font-size: 0.75rem; font-weight: 500; }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            animation: fadeIn 0.2s ease;
        }
        .modal-overlay.active { display: flex; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-content {
            background: var(--card);
            max-width: 520px;
            width: 100%;
            padding: 1.5rem 1.75rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            max-height: 90vh;
            overflow-y: auto;
            margin: auto;
            position: relative;
        }
        .modal-content h2 {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-content .close-modal {
            float: right;
            background: none; border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: var(--transition);
            padding: 0.2rem;
        }
        .modal-content .close-modal:hover {
            color: var(--text);
            transform: rotate(90deg);
        }

        /* ===== FORMS ===== */
        .form-group { margin-bottom: 0.8rem; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.78rem;
            margin-bottom: 0.2rem;
            color: var(--text);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.5rem 0.8rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            transition: var(--transition);
            background: var(--card);
            color: var(--text);
            min-height: 40px;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(224,90,58,0.08);
        }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .form-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        .form-actions button {
            flex: 1;
            min-width: 80px;
            justify-content: center;
            min-height: 40px;
        }

        /* ===== CROPPER ===== */
        .cropper-container { max-height: 300px; margin-bottom: 0.6rem; border-radius: var(--radius-xs); overflow: hidden; }
        .cropper-container img { max-width: 100%; display: block; }
        .image-actions {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin: 0.3rem 0 0.6rem;
        }
        .image-actions button { flex: 1; min-width: 60px; justify-content: center; min-height: 34px; font-size: 0.75rem; }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 2.5rem 1.5rem;
            background: var(--card);
            border-radius: var(--radius);
            border: 2px dashed var(--border);
        }
        .empty-state .empty-icon { font-size: 2.5rem; color: var(--border); margin-bottom: 0.6rem; }
        .empty-state h3 { font-weight: 700; margin-bottom: 0.2rem; font-size: 1rem; }
        .empty-state p { color: var(--text-secondary); margin-bottom: 0.8rem; font-size: 0.85rem; }

        /* ===== LOADING ===== */
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2.5rem;
            flex-direction: column;
            gap: 0.6rem;
        }
        .loading-spinner i { font-size: 2rem; color: var(--primary-light); }
        .loading-spinner span { color: var(--text-secondary); font-size: 0.85rem; }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            max-width: 360px;
            width: 100%;
        }
        .toast {
            padding: 0.6rem 1rem;
            border-radius: var(--radius-sm);
            color: white;
            font-weight: 500;
            box-shadow: var(--shadow-md);
            animation: slideIn 0.3s ease;
            font-size: 0.85rem;
        }
        .toast-success { background: var(--success); }
        .toast-error { background: var(--danger); }
        .toast-info { background: var(--primary); }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 1.5rem 0;
            color: var(--text-light);
            font-size: 0.75rem;
            border-top: 1px solid var(--border);
            margin-top: 1.5rem;
        }

        /* ===== CHAT ===== */
        .chat-two-col {
            display: flex;
            flex-direction: column;
            height: 65vh;
            min-height: 400px;
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .chat-two-col .chat-list-col {
            width: 100%;
            border-right: none;
            overflow-y: auto;
            background: var(--bg);
            max-height: 180px;
        }
        .chat-two-col .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 280px;
        }
        .chat-two-col .chat-main .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            background: var(--bg);
        }
        .chat-two-col .chat-main .chat-input {
            display: flex;
            gap: 0.4rem;
            padding: 0.6rem 0.8rem;
            border-top: 1px solid var(--border);
            background: var(--card);
        }
        .chat-two-col .chat-main .chat-input input {
            flex: 1;
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            background: var(--bg);
            min-height: 36px;
            transition: var(--transition);
        }
        .chat-two-col .chat-main .chat-input input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .chat-two-col .chat-main .chat-input button {
            padding: 0.4rem 1rem;
            border: none;
            border-radius: 50px;
            background: var(--primary);
            color: white;
            cursor: pointer;
            transition: var(--transition);
            min-height: 36px;
            min-width: 40px;
        }
        .chat-two-col .chat-main .chat-input button:hover { background: var(--accent); }

        .chat-header {
            padding: 0.6rem 0.8rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card);
            flex-wrap: wrap;
            gap: 0.4rem;
        }
        .chat-header .chat-user {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .chat-header .chat-user img {
            width: 36px; height: 36px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg);
            border: 2px solid var(--border);
        }
        .chat-header .chat-user .name { font-weight: 700; font-size: 0.9rem; }
        .chat-header .chat-user .status { font-size: 0.65rem; color: var(--text-secondary); }

        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            padding: 0.4rem;
        }
        .chat-list .chat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.6rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .chat-list .chat-item:hover {
            background: var(--card);
            border-color: var(--border);
        }
        .chat-list .chat-item.active {
            background: var(--card);
            border-color: var(--accent);
        }
        .chat-list .chat-item img {
            width: 36px; height: 36px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg);
        }
        .chat-list .chat-item .info { flex: 1; }
        .chat-list .chat-item .info .name { font-weight: 600; font-size: 0.85rem; }
        .chat-list .chat-item .info .last-msg {
            font-size: 0.7rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-list .chat-item .time { font-size: 0.6rem; color: var(--text-secondary); }

        .chat-message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }
        .chat-message.sent { align-self: flex-end; align-items: flex-end; }
        .chat-message.received { align-self: flex-start; align-items: flex-start; }
        .chat-message .bubble {
            padding: 0.5rem 0.8rem;
            border-radius: 12px;
            background: var(--card);
            box-shadow: var(--shadow-xs);
            word-break: break-word;
            font-size: 0.85rem;
        }
        .chat-message.sent .bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .chat-message.received .bubble {
            background: var(--card);
            border-bottom-left-radius: 4px;
        }
        .chat-message .message-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 4px;
            font-size: 0.6rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .chat-message.sent .message-meta { color: rgba(255,255,255,0.5); }
        .chat-message .seen-indicator {
            font-size: 0.55rem;
            color: var(--success);
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }
        .chat-message .sender-avatar {
            width: 24px; height: 24px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg);
            flex-shrink: 0;
        }
        .chat-message .message-row {
            display: flex;
            align-items: flex-end;
            gap: 4px;
        }
        .chat-message.sent .sender-avatar { order: 1; margin-left: 4px; }
        .chat-message.received .sender-avatar { margin-right: 4px; }

        .typing-indicator {
            display: none;
            padding: 0.2rem 0.6rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-style: italic;
            background: var(--bg);
            border-radius: var(--radius-sm);
            align-self: flex-start;
            margin: 0.1rem 0.8rem;
        }
        .typing-indicator.active { display: block; }
        .typing-dots::after {
            content: '...';
            animation: dots 1.4s infinite;
        }
        @keyframes dots {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }

        /* ===== VIDEO CALL ===== */
        .video-call-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 5000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 1rem;
        }
        .video-call-overlay.active { display: flex; }
        .video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }
        .video-container video {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .video-container .local-video {
            position: absolute;
            bottom: 10px; right: 10px;
            width: 100px; height: 75px;
            border-radius: var(--radius-xs);
            border: 2px solid rgba(255,255,255,0.3);
            object-fit: cover;
            background: #1a1a1a;
        }
        .video-call-controls {
            margin-top: 0.8rem;
            display: flex;
            gap: 0.6rem;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        .video-call-controls button {
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            min-height: 40px;
            min-width: 80px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-end-call { background: var(--danger); color: white; }
        .btn-end-call:hover { background: #B91C1C; transform: scale(1.05); }
        .btn-mute-toggle {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .btn-mute-toggle:hover { background: rgba(255,255,255,0.2); }

        .incoming-call {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 4000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .incoming-call.active { display: flex; }
        .incoming-call-box {
            background: var(--card);
            padding: 1.75rem 2rem;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: var(--shadow-lg);
            max-width: 360px;
            width: 100%;
            animation: fadeIn 0.3s ease;
        }
        .incoming-call-box h3 { margin-bottom: 0.3rem; font-size: 1rem; color: var(--text-secondary); }
        .incoming-call-box .caller-name { font-size: 1.2rem; font-weight: 800; }
        .incoming-call-box .call-actions {
            display: flex;
            gap: 0.6rem;
            justify-content: center;
            margin-top: 1rem;
        }
        .incoming-call-box .call-actions button {
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            min-width: 70px;
            min-height: 40px;
            font-size: 0.85rem;
        }
        .btn-accept-call { background: var(--success); color: white; }
        .btn-accept-call:hover { background: #15803D; transform: scale(1.05); }
        .btn-decline-call { background: var(--danger); color: white; }
        .btn-decline-call:hover { background: #B91C1C; transform: scale(1.05); }

        /* ===== RESPONSIVE ===== */
        @media (min-width: 769px) {
            .sidebar { transform: translateX(0) !important; }
            .sidebar-close { display: none !important; }
            .sidebar-overlay { display: none !important; }
            .main-content {
                margin-left: var(--sidebar-width);
                padding: 1.25rem 2rem 2rem;
                padding-top: calc(1.25rem + var(--safe-top));
                padding-bottom: calc(2rem + var(--safe-bottom));
                width: calc(100% - var(--sidebar-width));
            }
            .topbar .hamburger { display: none !important; }
            .chat-two-col { flex-direction: row; }
            .chat-two-col .chat-list-col {
                width: 260px;
                border-right: 1px solid var(--border);
                max-height: 65vh;
            }
            .chat-two-col .chat-main { min-height: 400px; }
            .video-container .local-video { width: 140px; height: 100px; }
        }

        @media (max-width: 768px) {
            .main-content { padding: 0.6rem 0.6rem 1rem; }
            .topbar .page-title { font-size: 0.95rem; }
            .hero { padding: 1.5rem 1rem; border-radius: var(--radius-sm); }
            .hero h1 { font-size: 1.3rem; }
            .hero p { font-size: 0.85rem; }
            .features { grid-template-columns: 1fr; gap: 0.6rem; }
            .listings-grid { grid-template-columns: 1fr; gap: 0.6rem; }
            .modal-content { padding: 1.2rem; margin: 0.5rem; border-radius: var(--radius-sm); }
            .dashboard-stats { grid-template-columns: 1fr 1fr; gap: 0.6rem; }
            .search-bar {
                border-radius: var(--radius-sm);
                padding: 0.6rem;
                flex-direction: column;
            }
            .search-bar input,
            .search-bar select { flex: 1 1 100%; width: 100%; }
            .search-bar .btn-primary { width: 100%; justify-content: center; }
            .owner-message-card { padding: 1rem 1.2rem; border-radius: var(--radius-sm); }
            .owner-message-content { font-size: 0.9rem; }
            .toast-container { bottom: 0.6rem; right: 0.6rem; left: 0.6rem; max-width: 100%; }
            .chat-two-col { height: 55vh; min-height: 320px; }
            .chat-two-col .chat-list-col { max-height: 140px; }
            .video-container .local-video { width: 70px; height: 55px; bottom: 6px; right: 6px; }
            .video-call-controls button { padding: 0.4rem 0.8rem; font-size: 0.75rem; min-width: 60px; min-height: 34px; }
            .form-actions { flex-direction: column; }
            .form-actions button { flex: none; width: 100%; }
            .incoming-call-box { padding: 1.25rem; }
            .incoming-call-box .call-actions button { min-width: 50px; padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        }

        @media (max-width: 480px) {
            .hero { padding: 1rem 0.8rem; }
            .hero h1 { font-size: 1.1rem; }
            .dashboard-stats { grid-template-columns: 1fr; }
            .feature-card { padding: 1rem 0.8rem; }
            .listing-card .img-wrap { height: 140px; }
            .topbar .top-actions .btn-primary {
                padding: 0.3rem 0.6rem;
                font-size: 0.7rem;
                min-height: 32px;
            }
            .modal-content { padding: 0.8rem; }
            .video-container .local-video { width: 55px; height: 42px; }
        }

        @supports (padding: max(0px)) {
            .sidebar {
                padding-left: max(1rem, env(safe-area-inset-left));
                padding-right: max(1rem, env(safe-area-inset-right));
            }
            .main-content {
                padding-left: max(0.6rem, env(safe-area-inset-left));
                padding-right: max(0.6rem, env(safe-area-inset-right));
            }
        }
    </style>
</head>

        </button>

        </button>

        </button>

            <i class="fas fa-users"></i> All Users <span class="badge" id="userCountBadge">0</span>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    // ============================================================
    // CONFIGURATION
    // ============================================================
    const API_URL = 'https://list-server-v6.onrender.com';

    // ============================================================
    // STATE
    // ============================================================
    let currentUser = null;
    let token = localStorage.getItem('token');
    let cropper = null;
    let pendingFormData = null;
    let pendingSection = 'items';
    let editImageData = null;
    let currentView = 'home';
    let resetPhone = '';

    let navigationHistory = ['home'];
    let historyIndex = 0;
    let isLoading = false;

    // Chat state
    let currentChatUser = null;
    let chatMessages = [];
    let allUsers = [];

    // Typing state
    let typingTimeout = null;
    let isTyping = false;

    // Video call state
    let localStream = null;
    let remoteStream = null;
    let peerConnection = null;
    let callInProgress = false;
    let incomingCallData = null;
    let isCaller = false;

    // ============================================================
    // NAVIGATION
    // ============================================================
    function navigateTo(view, params = null) {
        if (isLoading) return;
        const viewMap = {
            'home': showHome,
            'items': () => showSection('items'),
            'properties': () => showSection('properties'),
            'jobs': () => showSection('jobs'),
            'dashboard': showDashboard,
            'users': showAllUsers,
            'friends': showFriends,
            'chat': showChat,
            'notifications': showNotifications,
        };
        
        const currentPath = navigationHistory[historyIndex];
        if (currentPath !== view) {
            if (historyIndex < navigationHistory.length - 1) {
                navigationHistory = navigationHistory.slice(0, historyIndex + 1);
            }
            navigationHistory.push(view);
            historyIndex = navigationHistory.length - 1;
            window.history.pushState({ view, index: historyIndex }, '', '#' + view);
        }
        
        updateBackButton();
        if (viewMap[view]) {
            viewMap[view]();
        }
    }

    function goBack() {
        if (historyIndex > 0) {
            historyIndex--;
            const view = navigationHistory[historyIndex];
            window.history.replaceState({ view, index: historyIndex }, '', '#' + view);
            const viewMap = {
                'home': showHome,
                'items': () => showSection('items'),
                'properties': () => showSection('properties'),
                'jobs': () => showSection('jobs'),
                'dashboard': showDashboard,
                'users': showAllUsers,
                'friends': showFriends,
                'chat': showChat,
                'notifications': showNotifications,
            };
            if (viewMap[view]) viewMap[view]();
            updateBackButton();
        }
    }

    function updateBackButton() {
        const btn = document.getElementById('backButton');
        if (historyIndex > 0 && currentView !== 'home') {
            btn.style.display = 'inline-flex';
        } else {
            btn.style.display = 'none';
        }
    }

    window.addEventListener('popstate', (e) => {
        if (e.state && e.state.view) {
            historyIndex = e.state.index || 0;
            const view = e.state.view;
            const viewMap = {
                'home': showHome,
                'items': () => showSection('items'),
                'properties': () => showSection('properties'),
                'jobs': () => showSection('jobs'),
                'dashboard': showDashboard,
                'users': showAllUsers,
                'friends': showFriends,
                'chat': showChat,
                'notifications': showNotifications,
            };
            if (viewMap[view]) viewMap[view]();
            updateBackButton();
        }
    });

    // ============================================================
    // BUTTON LOADING STATE
    // ============================================================
    function setButtonLoading(button, loading, text = null) {
        if (!button) return;
        if (loading) {
            button.classList.add('loading');
            button.disabled = true;
            if (text) {
                const span = button.querySelector('.btn-text') || document.createElement('span');
                span.className = 'btn-text';
                span.textContent = text;
                if (!button.querySelector('.btn-text')) {
                    button.prepend(span);
                }
            }
            if (!button.querySelector('.spinner')) {
                const spinner = document.createElement('span');
                spinner.className = 'spinner';
                button.prepend(spinner);
            }
        } else {
            button.classList.remove('loading');
            button.disabled = false;
            const spinner = button.querySelector('.spinner');
            if (spinner) spinner.remove();
            const textEl = button.querySelector('.btn-text');
            if (textEl) textEl.remove();
        }
    }

    // ============================================================
    // TOAST
    // ============================================================
    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(100%)';
            setTimeout(() => toast.remove(), 300);
        }, 4000);
    }

    // ============================================================
    // SIDEBAR
    // ============================================================
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
        document.body.style.overflow = sidebar.classList.contains('open') ? 'hidden' : '';

        document.getElementById('sidebarOverlay').classList.remove('active');
        document.body.style.overflow = '';

    // ============================================================
    // API CLIENT
    // ============================================================
    async function apiRequest(endpoint, method = 'GET', data = null, isFormData = false) {
        const headers = {};
        const token = localStorage.getItem('token');
        if (token) headers['Authorization'] = `Bearer ${token}`;
        const options = { method, headers };
        if (data) {
            if (isFormData) {
                options.body = data;
            } else {
                headers['Content-Type'] = 'application/json';
                options.body = JSON.stringify(data);
            }
        }
        try {
            const response = await fetch(`${API_URL}${endpoint}`, options);
            const result = await response.json();
            if (!response.ok) {
                if (response.status === 401) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    currentUser = null;
                    updateSidebarUI();
                    showToast('Session expired. Please login again.', 'error');
                    showAuth();
                    throw new Error('Unauthorized');
                }
                throw new Error(result.error || result.message || 'Request failed');
            }
            return result;
        } catch (error) {
            if (error.message === 'Failed to fetch') {
                showToast('⚠️ Cannot connect to server.', 'error');
            } else if (error.message !== 'Unauthorized') {
                showToast('❌ ' + error.message, 'error');
            }
            throw error;
        }
    }

    // ============================================================
    // SOCKET.IO SETUP
    // ============================================================
    function initSocket() {
        if (socket) { socket.disconnect(); socket = null; }
        const token = localStorage.getItem('token');
        if (!token) return;

        socket = io(API_URL, {
            auth: { token },
            transports: ['websocket', 'polling'],
            reconnection: true,
            reconnectionAttempts: 5,
            reconnectionDelay: 1000,
        });

        socket.on('connect', () => {
            console.log('🔌 Socket connected');
        });

        socket.on('connect_error', (err) => {
            console.error('Socket error:', err.message);
        });

        socket.on('new_message', (chat) => {
            if (currentChatUser && chat.senderId === currentChatUser._id) {
                chatMessages.push(chat);
                renderChatMessages();
                socket.emit('mark_read', { otherUserId: currentChatUser._id });
            } else {
                updateUnreadCounts();
            }
            if (currentView !== 'chat' || !currentChatUser || chat.senderId !== currentChatUser._id) {
                showToast(`💬 New message from ${chat.senderName || 'Someone'}`, 'info');
            }
        });

        socket.on('unread_update', ({ count }) => {
            updateUnreadCounts();
        });

        socket.on('notification', (notification) => {
            updateUnreadCounts();
            showToast(`🔔 ${notification.title}: ${notification.body}`, 'info');
        });

        socket.on('typing', ({ senderId }) => {
            if (currentChatUser && senderId === currentChatUser._id) {
                showTypingIndicator(true);
            }
        });
        socket.on('stop_typing', ({ senderId }) => {
            if (currentChatUser && senderId === currentChatUser._id) {
                showTypingIndicator(false);
            }
        });

        socket.on('message_read', ({ messageId }) => {
            const msg = chatMessages.find(m => m._id === messageId);
            if (msg) {
                msg.seen = true;
                renderChatMessages();
            }
        });

        socket.on('message_deleted', ({ messageId }) => {
            chatMessages = chatMessages.filter(m => m._id !== messageId);
            renderChatMessages();
            showToast('💬 Message deleted', 'info');
        });

        socket.on('incoming_call', ({ from, name }) => {
            incomingCallData = { from, name };
            document.getElementById('callerName').textContent = name;
            document.getElementById('incomingCall').classList.add('active');
        });

        socket.on('call_accepted', ({ from }) => {
            if (callInProgress && isCaller) {
                initiateCall(from);
            }
        });

        socket.on('call_declined', () => {
            if (callInProgress) {
                endCall();
                showToast('📵 Call declined', 'error');
            }
        });

        socket.on('webrtc_offer', async ({ from, sdp }) => {
            if (!callInProgress && !incomingCallData) return;
            await handleWebRTCAnswer(from, sdp);
        });

        socket.on('webrtc_answer', async ({ from, sdp }) => {
            if (peerConnection && callInProgress && isCaller) {
                try {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(sdp));
                } catch (e) {
                    console.error('Error setting remote description:', e);
                }
            }
        });

        socket.on('webrtc_ice', async ({ from, candidate }) => {
            if (peerConnection && callInProgress) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                } catch (e) {
                    console.error('Error adding ICE candidate:', e);
                }
            }
        });

        socket.on('call_ended', () => {
            endCall();
            showToast('📞 Call ended', 'info');
        });

        socket.on('disconnect', () => {
            console.log('🔌 Socket disconnected');
        });
    }

    // ============================================================
    // UNREAD COUNTS
    // ============================================================
    async function updateUnreadCounts() {
        if (!currentUser) return;
        try {
            const chatResult = await apiRequest('/api/chat/unread');
            const chatCount = chatResult.count || 0;
            document.getElementById('chatBadge').textContent = chatCount;

            const notifResult = await apiRequest('/api/notifications/unread-count');
            const notifCount = notifResult.count || 0;
            document.getElementById('notifBadge').textContent = notifCount;
            document.getElementById('notifDot').style.display = notifCount > 0 ? 'block' : 'none';
        } catch (e) {
            console.error('Error updating unread counts:', e);
        }
    }

    // AUTH
    // ============================================================
    async function login(phone, password, button = null) {
        try {
            if (button) setButtonLoading(button, true, 'Signing in...');
            const result = await apiRequest('/api/auth/login', 'POST', { phone, password });
            if (result.success) {
                localStorage.setItem('token', result.token);
                localStorage.setItem('user', JSON.stringify(result.user));
                currentUser = result.user;
                updateSidebarUI();
                initSocket();
                navigateTo('home');
                showToast('✅ Welcome back, ' + result.user.name + '!', 'success');
                if (button) setButtonLoading(button, false);
                return true;
            }
            if (button) setButtonLoading(button, false);
            return false;
        } catch (error) {
            if (button) setButtonLoading(button, false);
            return false;
        }
    }

    async function register(userData, button = null) {
        try {
            if (button) setButtonLoading(button, true, 'Creating account...');
            const email = userData.phone + '@njalamarket.com';
            const payload = { ...userData, email };
            const result = await apiRequest('/api/auth/register', 'POST', payload);
            if (result.success) {
                localStorage.setItem('token', result.token);
                localStorage.setItem('user', JSON.stringify(result.user));
                currentUser = result.user;
                updateSidebarUI();
                initSocket();
                navigateTo('home');
                showToast('🎉 Account created! Welcome to NjalaMarket.', 'success');
                if (button) setButtonLoading(button, false);
                return true;
            }
            if (button) setButtonLoading(button, false);
            return false;
        } catch (error) {
            if (button) setButtonLoading(button, false);
            return false;
        }
    }

        localStorage.removeItem('user');

        if (socket) { socket.disconnect(); socket = null; }

    function initCropper(imageUrl) {

            const img = document.getElementById('cropImage');

            cropper = new Cropper(img, {
                aspectRatio: 1,
                viewMode: 1,
                autoCropArea: 0.8,
                responsive: true,
                restore: false,
                guides: true,
                center: true,
                highlight: true,
                cropBoxMovable: true,
                cropBoxResizable: true,
                toggleDragModeOnDblclick: true,
            });
        }, 150);
    }

    function getCroppedImage() {
        if (!cropper) return null;
        return cropper.getCroppedCanvas({
            width: 600,
            height: 600,
            imageSmoothingEnabled: true,
            imageSmoothingQuality: 'high'
        }).toDataURL('image/jpeg', 0.9);
    }

    function getSkippedImage() {
        const img = document.getElementById('cropImage');
        if (!img) return null;
        const canvas = document.createElement('canvas');
        canvas.width = 600;
        canvas.height = 600;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, 600, 600);
        return canvas.toDataURL('image/jpeg', 0.8);
    }

    async function applySearch() {
        const query = document.getElementById('searchQuery').value.toLowerCase().trim();
        const category = document.getElementById('searchCategory').value;
        const location = document.getElementById('searchLocation').value.toLowerCase().trim();

        try {
            const [products, properties, jobs] = await Promise.all([
                apiRequest('/api/products'),
                apiRequest('/api/properties'),
                apiRequest('/api/jobs')
            ]);

            let all = [
                ...(products.products || []).map(p => ({ ...p, type: 'product' })),
                ...(properties.properties || []).map(p => ({ ...p, type: 'property' })),
                ...(jobs.jobs || []).map(j => ({ ...j, type: 'job' }))
            ];

            if (query) {
                all = all.filter(item => item.title.toLowerCase().includes(query) || (item.company && item.company.toLowerCase().includes(query)));
            }
            if (category) {
                all = all.filter(item => {
                    if (item.type === 'product') return item.category === category;
                    if (item.type === 'property') return item.listingType === category || item.type === category;
                    if (item.type === 'job') return item.employmentType === category;
                    return false;
                });
            }
            if (location) {
                all = all.filter(item => item.location.toLowerCase().includes(location));
            }

            const grid = document.getElementById('searchResults');
            if (all.length === 0) {
                grid.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-search"></i></div><h3>No matches found</h3><p>Try adjusting your search filters.</p></div>`;
            } else {
                grid.innerHTML = all.map(item => renderListingCard(item, false)).join('');
            }
        } catch (error) {
            showToast('Error searching listings', 'error');
        }
    }

    function clearSearch() {
        document.getElementById('searchQuery').value = '';
        document.getElementById('searchCategory').value = '';
        document.getElementById('searchLocation').value = '';
        showHome();
    }

        openModal(`

                        <div class="image-actions">
                            <button type="button" class="btn-success" onclick="confirmProfileCrop()"><i class="fas fa-crop-alt"></i> Crop</button>
                            <button type="button" class="btn-secondary" onclick="skipProfileCrop()"><i class="fas fa-forward"></i> Skip</button>
                            <button type="button" class="btn-danger" onclick="cancelProfileImage()"><i class="fas fa-times"></i> Remove</button>
                        </div>
                    </div>
                </div>
                <div class="form-group"><label>Full Name *</label><input name="name" value="${user.name || ''}" required /></div>
                <div class="form-group"><label>Phone Number</label><input name="phone" value="${user.phone || ''}" /></div>
                <div class="form-group"><label>Location (District)</label><input name="district" value="${user.district || ''}" /></div>
                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender">
                        <option value="">Select...</option>
                        <option value="Male" ${user.gender === 'Male' ? 'selected' : ''}>Male</option>
                        <option value="Female" ${user.gender === 'Female' ? 'selected' : ''}>Female</option>
                        <option value="Other" ${user.gender === 'Other' ? 'selected' : ''}>Other</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary" id="saveProfileBtn"><i class="fas fa-save"></i> <span class="btn-text">Save Profile</span></button>
                    <button type="button" class="btn-danger" onclick="confirmDeleteAccount()"><i class="fas fa-user-slash"></i> Delete Account</button>
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        `);

        let profileImageData = null;
        const imgInput = document.getElementById('profileImageInput');
        if (imgInput) {
            imgInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        const container = document.getElementById('profileImagePreview');
                        const img = document.getElementById('cropImage');
                        img.src = ev.target.result;
                        container.style.display = 'block';
                        initCropper(ev.target.result);
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        window.confirmProfileCrop = function() {
            const cropped = getCroppedImage();
            if (cropped) {
                profileImageData = cropped;
                document.getElementById('profileImagePreview').style.display = 'none';
                if (cropper) { cropper.destroy(); cropper = null; }
                showToast('✅ Profile picture cropped!', 'success');
            }
        };
        window.skipProfileCrop = function() {
            const skipped = getSkippedImage();
            if (skipped) {
                profileImageData = skipped;
                document.getElementById('profileImagePreview').style.display = 'none';
                if (cropper) { cropper.destroy(); cropper = null; }
                showToast('✅ Profile picture saved!', 'success');
            }
        };
        window.cancelProfileImage = function() {
            profileImageData = null;
            document.getElementById('profileImagePreview').style.display = 'none';
            document.getElementById('profileImageInput').value = '';
            if (cropper) { cropper.destroy(); cropper = null; }
        };

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveProfileBtn');
            setButtonLoading(btn, true, 'Saving...');
            const fd = new FormData(e.target);
            if (profileImageData) {
                fd.append('profilePictureData', profileImageData);
            }
            try {
                const result = await apiRequest('/api/auth/profile', 'PUT', fd, true);
                if (result.success) {
                    localStorage.setItem('user', JSON.stringify(result.user));
                    currentUser = result.user;
                    updateSidebarUI();
                    setButtonLoading(btn, false);
                    closeModal();
                    showToast('✅ Profile updated successfully!', 'success');
                }
            } catch (error) {

    async function fetchChatMessages(userId) {
        try {
            const result = await apiRequest(`/api/chat/messages/${userId}`);
            chatMessages = result.messages || [];
            renderChatMessages();
        } catch (error) {
            showToast('Error loading messages', 'error');
        }
    }

    function renderChatMessages() {
        const container = document.getElementById('chatMessages');
        if (!container) return;
        if (chatMessages.length === 0) {
            container.innerHTML = `<div class="empty-state" style="padding:1rem;"><p>No messages yet. Say hello!</p></div>`;
            return;
        }
        let html = '';
        chatMessages.forEach((msg) => {
            const isSent = msg.senderId === currentUser._id;
            const sender = isSent ? currentUser : currentChatUser;
            const avatar = sender?.profilePicture || 'https://placehold.co/32x32/1e2f3d/white?text=' + (sender?.name?.charAt(0) || '?');
            const time = new Date(msg.createdAt);
            const timeStr = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const dateStr = time.toDateString() === new Date().toDateString() ? 'Today' :
                           time.toDateString() === new Date(Date.now() - 86400000).toDateString() ? 'Yesterday' :
                           time.toLocaleDateString();
            const fullTime = `${dateStr}, ${timeStr}`;
            const seenHtml = (isSent && msg.seen) ? `<span class="seen-indicator"><i class="fas fa-check-double"></i> Seen</span>` :
                             (isSent && !msg.seen) ? `<span class="seen-indicator" style="color:rgba(255,255,255,0.3);"><i class="fas fa-check"></i></span>` : '';
            html += `
                <div class="chat-message ${isSent ? 'sent' : 'received'}" data-msgid="${msg._id}">
                    <div class="message-row">
                        ${!isSent ? `<img src="${avatar}" class="sender-avatar" alt="avatar" />` : ''}
                        <div class="bubble" ondblclick="deleteMessage('${msg._id}')">${msg.message}</div>
                        ${isSent ? `<img src="${avatar}" class="sender-avatar" alt="avatar" />` : ''}
                    </div>
                    <div class="message-meta">
                        <span>${fullTime}</span>
                        ${seenHtml}
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
    }

    function sendChatMessage() {
        const input = document.getElementById('chatInput');
        if (!input || !input.value.trim() || !currentChatUser) return;
        const msg = input.value.trim();
        if (socket && socket.connected) {
            socket.emit('send_message', { receiverId: currentChatUser._id, message: msg });
        } else {
            apiRequest('/api/chat/messages', 'POST', { receiverId: currentChatUser._id, message: msg })
                .then(res => {
                    chatMessages.push(res.message);
                    renderChatMessages();
                })
                .catch(err => showToast('Error sending message', 'error'));
        }
        const tempMsg = { senderId: currentUser._id, message: msg, createdAt: new Date().toISOString(), seen: false };
        chatMessages.push(tempMsg);
        renderChatMessages();
        input.value = '';
        if (socket) socket.emit('stop_typing', { receiverId: currentChatUser._id });
    }

    function markChatRead() {
        if (!currentChatUser) return;
        if (socket) {
            socket.emit('mark_read', { otherUserId: currentChatUser._id });
        }
        chatMessages.forEach(msg => { if (msg.senderId === currentChatUser._id) msg.read = true; });
        updateUnreadCounts();
    }

    function showTypingIndicator(show) {
        const el = document.getElementById('typingIndicator');
        if (el) {
            el.classList.toggle('active', show);
        }
    }

    document.addEventListener('input', function(e) {
        if (e.target && e.target.id === 'chatInput') {
            if (!currentChatUser || !socket) return;
            if (e.target.value.trim().length > 0) {
                if (!isTyping) {
                    isTyping = true;
                    socket.emit('typing', { receiverId: currentChatUser._id });
                }
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    isTyping = false;
                    socket.emit('stop_typing', { receiverId: currentChatUser._id });
                }, 1500);
            } else {
                if (isTyping) {
                    isTyping = false;
                    socket.emit('stop_typing', { receiverId: currentChatUser._id });
                }
            }
        }
    });

    function markMessagesAsSeen(userId) {
        if (!socket) return;
        const unseen = chatMessages.filter(m => m.senderId === userId && !m.seen);
        if (unseen.length === 0) return;
        unseen.forEach(msg => {
            socket.emit('message_read', { messageId: msg._id });
            msg.seen = true;
        });
        renderChatMessages();
    }

    async function deleteMessage(messageId) {
        if (!currentUser) return;
        const msg = chatMessages.find(m => m._id === messageId);
        if (!msg) return;
        if (msg.senderId !== currentUser._id) {
            showToast('You can only delete your own messages.', 'error');
            return;
        }
        if (!confirm('Delete this message?')) return;
        try {
            if (socket) {
                socket.emit('delete_message', { messageId });
            } else {
                await apiRequest(`/api/chat/messages/${messageId}`, 'DELETE');
                chatMessages = chatMessages.filter(m => m._id !== messageId);
                renderChatMessages();
                showToast('💬 Message deleted', 'success');
            }
        } catch (e) {
            showToast('Error deleting message', 'error');
        }
    }

    function startVideoCall() {
        if (!currentChatUser) { showToast('Select a user first', 'error'); return; }
        if (callInProgress) { showToast('Call already in progress', 'error'); return; }
        if (!socket || !socket.connected) { showToast('Socket not connected', 'error'); return; }

        isCaller = true;

        callInProgress = true;
